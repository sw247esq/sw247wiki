<script id="dps2-data">
const DPS2=[
{r:'dps',sr:'Recon',n:'Pharah',sl:'pharah',nat:'Egypt',fl:'eg',
ov:"A Recon damage hero who dominates from the air. Rocket Launcher splash has no falloff and punishes any grouped positioning, while Jump Jet, Jet Dash, and Hover Jets give her near-indefinite aerial control over a dimension most of the roster simply cannot reach.",
ab:[{k:'Space',n:'Hover Jets',d:'Hold to hover.'},{k:'LMB',n:'Rocket Launcher',d:'Long-range explosive projectile weapon.'},{k:'RMB',n:'Jet Dash',d:'Boost horizontally.'},{k:'Shift',n:'Jump Jet',d:'Fly rapidly upwards. Grants some fuel.'},{k:'E',n:'Concussive Blast',d:'Launch an explosive blast to knock back enemies.'},{k:'Q',n:'Barrage',d:'Hover in place and launch a continuous volley of mini-rockets.',u:1,va:'"Rocket Barrage incoming!"',ve:'"Justice rains from above!"'}],
pk:[{t:'Minor',n:'Concussive Force',d:'Concussive Blast deals up to 50 explosion damage.'},{t:'Minor',n:'Helix Shields',d:'Convert 125 health to shields. Direct hits with the Rocket Launcher triggers passive shield regeneration.'},{t:'Major',n:'Fuel Stores',d:'Jet Dash grants 50% fuel. Maximum overfuel is increased by 100%.'},{t:'Major',n:'Rocket Salvo',d:'After using a movement ability, the next primary fire shoots two spiraling mini-rockets, each dealing 40 damage.'}],
st:"Pharah dominates any team without reliable hitscan heroes — the majority of DPS and all supports struggle to hit her aerial position. Mercy damage-boost turns her rockets into near-lethal single hits. Concussive Blast gives her great self-defense mobility that can punish any dive hero attempting to reach her.",
ct:{tank:"Ashe: Scoped shots are the most reliable hitscan answer to her aerial position. — Echo: Matches her aerial maneuverability; Focusing Beam finishes at half health. — Baptiste: Amplification Matrix doubles allied hitscan damage into her aerial path.",dps:"",sup:""}},

{r:'dps',sr:'Flanker',n:'Reaper',sl:'reaper',nat:'USA',fl:'us',
ov:"A close-range Flanker who heals through damage via The Reaping passive and becomes briefly invulnerable with Wraith Form. He is nearly unkillable in sustained close-range brawls and accesses flanking angles via Shadow Step that no other close-range hero can reach.",
ab:[{k:'Passive',n:'The Reaping',d:'Dealing damage heals you.'},{k:'LMB',n:'Hellfire Shotguns',d:'Short-range spread weapons.'},{k:'RMB',n:'Dire Triggers',d:'Fire a volley with long range accuracy from both Hellfire shotguns.'},{k:'Shift',n:'Wraith Form',d:'Move faster and become invulnerable, but you cannot shoot.'},{k:'E',n:'Shadow Step',d:'Teleport to a targeted location.'},{k:'Q',n:'Death Blossom',d:'Damage all nearby enemies.',u:1,va:'"Clearing the area!"',ve:'"DIE! DIE! DIE!"'}],
pk:[{t:'Minor',n:'Lingering Wraith',d:'Leaving Wraith Form grants 40% movement speed for 2 seconds.'},{t:'Minor',n:'Soul Reaving',d:'Collect Soul Globes from dead enemies to restore 50 health.'},{t:'Major',n:'Shadow Blink',d:'Shadow Step\'s cast time and cooldown are 25% faster, but the range is reduced by 25%.'},{t:'Major',n:'Trigger Finger',d:'Refresh Dire Triggers\' cooldown whenever using an ability or reloading.'}],
st:"The Reaping passive makes him almost unkillable in sustained close-range brawls — he heals faster than most heroes can damage him when trading shots at melee range. Death Blossom paired with Graviton Surge is one of the most reliable full-team wipe combinations in the game. Shadow Step gives him flanking angles no other close-range hero can access.",
ct:{tank:"Winston: Barrier Projector tanks his shotguns; Tesla Cannon ignores his lifesteal. — Roadhog: Hook one-shots him before Wraith Form can react. — Vendetta: Closes distance faster; Overhead Strike bypasses his self-heal window.",dps:"",sup:""}},

{r:'dps',sr:'Recon',n:'Sierra',sl:'sierra',nat:'Unknown',fl:null,isNew2:1,
ov:"A Recon hero who grapples to any surface on the map via Anchor Drone and auto-tracks wounded enemies through walls with her passive. Tracking Shot removes aerial evasion entirely — her Helix Rifle bullets curve to follow marked targets regardless of movement.",
ab:[{k:'LMB',n:'Helix Rifle',d:'Automatic assault weapon. Shoots in a spiral pattern, gaining accuracy with sustained fire.'},{k:'RMB',n:'Tracking Shot',d:'Marks an enemy. Helix Rifle shots automatically track marked enemies.'},{k:'Shift',n:'Anchor Drone',d:'Launch an Anchor Drone. Reactivate to launch towards it.'},{k:'E',n:'Tremor Charge',d:'Throw a charge that creates a shockwave on impact.'},{k:'Q',n:'Trailblazer',d:'Deploy a drone that flies forward and drops explosives.',u:1,va:'[CONFIRM ally line]',ve:'[CONFIRM enemy line]'}],
pk:[{t:'Minor',n:'Full Flight',d:'Increase Anchor Drone flight and grapple ranges by 25%.'},{t:'Minor',n:'Tight Grip',d:'Helix Rifle\'s bullet spread tightens 100% faster and widens 30% slower.'},{t:'Major',n:'Medi-Drone',d:'Anchor Drones hold a small medkit that can heal Sierra.'},{t:'Major',n:'Locked In',d:'Firing Tracking Shot increases your attack speed by 20% for 2 seconds.'}],
st:"Anchor Drone gives her mobility rivaling Tracer and Genji for map traversal, able to reach any surface on any map. Tracking Shot bridges sniper precision with sustained fire, providing a self-assisted aim window. The Recon passive makes her invaluable for team information when harassing low-health targets through walls.",
ct:{tank:"D.Va: Defense Matrix absorbs Helix Rifle fire; Boosters close to melee range. — Hazard: Vault reaches her drone positions; Jagged Wall denies her preferred sightlines. — Brigitte: Shield Bash interrupts Tracking Shot; armor absorbs her sustained fire.",dps:"",sup:""}},

{r:'dps',sr:'Sharpshooter',n:'Sojourn',sl:'sojourn',nat:'Canada',fl:'ca',
ov:"A self-sufficient Sharpshooter who charges a devastating railgun shot through dealing damage, then fires it for one-shot burst potential. Power Slide's aggressive repositioning and Disruptor Shot's slow give her strong tools for controlling both the engagement range and the fight tempo.",
ab:[{k:'LMB',n:'Railgun',d:'Rapid firing projectiles that generate energy on hit.'},{k:'RMB',n:'Charged Shot',d:'High impact shot that consumes stored energy and pierces enemies.'},{k:'Shift',n:'Power Slide',d:'Ground slide that can cancel into a high jump.'},{k:'E',n:'Disruptor Shot',d:'Launch an energy burst that deals damage to enemies within it.'},{k:'Q',n:'Overclock',d:'Railgun energy auto-charges for a short duration.',u:1,va:'"It\'s go time!"',ve:'"This ends now!"'}],
pk:[{t:'Minor',n:'Deceleration Field',d:'Enemies hit by Disruptor Shot are slowed by 25%.'},{t:'Minor',n:'Overcharged',d:'Railgun’s maximum energy is increased by 50 while Overclock is active.'},{t:'Major',n:'Dual Thrusters',d:'Power Slide gains an additional charge and its jump height shifts to lateral movement.'},{t:'Major',n:'Friction Generators',d:'While sliding, Power Slide generates up to 50 Energy.'}],
st:"Her railgun's charged shot can eliminate most heroes in a single hit from full health, making every engagement a kill threat. Power Slide provides aggressive repositioning that also reduces cooldowns on critical hits. Overclock removes the resource constraint for several seconds, enabling a barrage of lethal charged shots.",
ct:{tank:"Hazard: Violent Leap closes the distance before she can charge a rail shot. — Jetpack Cat: Aerial positioning removes her Power Slide sightlines. — Mercy: Damage boost on an enemy DPS makes surviving rail shots nearly impossible.",dps:"",sup:""}},

{r:'dps',sr:'Specialist',n:'Soldier: 76',sl:'soldier-76',nat:'USA',fl:'us',
ov:"The most reliable all-rounder in the game — Biotic Field self-sustain lets him win extended fights, Helix Rockets spike burst on demand, and Tactical Visor auto-aims at all enemies in line of sight regardless of how evasively they move.",
ab:[{k:'LMB',n:'Heavy Pulse Rifle',d:'Automatic assault weapon.'},{k:'RMB',n:'Helix Rockets',d:'Launch a volley of explosive rockets.'},{k:'Shift',n:'Sprint',d:'Run faster while moving forward.'},{k:'E',n:'Biotic Field',d:'Deploy a field that heals you and your allies.'},{k:'Q',n:'Tactical Visor',d:'Automatically aims your weapon at targets in view.',u:1,va:'"Tactical Visor activated."',ve:'"I\'ve got you in my sights!"'}],
pk:[{t:'Minor',n:'Helix Propulsion',d:'Helix Rockets\' projectile speed is increased by 50%.'},{t:'Minor',n:'Tactical Salvo',d:'During Tactical Visor, Helix Rockets\' cooldown is reduced by 80% and no longer interrupts firing Heavy Pulse Rifle.'},{t:'Major',n:'Full Stride',d:'Sprint\'s movement speed bonus gradually increases by an additional 25% over 2 seconds.'},{t:'Major',n:'Stim PackE',d:'Stim Pack replaces Biotic Field. On use, Soldier: 76 heals for 30 health per second and gains 20% increased attack speed for 5 seconds.'}],
st:"Biotic Field self-sustain means Soldier: 76 can win extended fights against heroes who must disengage to heal. Tactical Visor turns him into a hitscan auto-win machine — it even tracks through evasive movement, dealing lethal damage to heroes like Dragonblade Genji. His combination of sprint, heals, and burst makes him almost never a bad pick.",
ct:{tank:"Pharah: Floats above his optimal Helix Rocket range. — Echo: Flight counters his ground-focused kit; Duplicate steals Tactical Visor. — Vendetta: Closes distance faster than he can disengage with Sprint.",dps:"",sup:""}},

{r:'dps',sr:'Recon',n:'Sombra',sl:'sombra',nat:'Mexico',fl:'mx',
ov:"The game's premier disruptor who hacks enemies to disable all their abilities for several seconds. EMP simultaneously hacks every nearby enemy, destroys all shields and barriers, and forces the entire team to fight ability-less — one of the most fight-altering ultimates in the game.",
ab:[{k:'Passive',n:'Opportunist',d:'You detect enemy ultimate abilities on nameplates, and deal more damage to hacked enemies.'},{k:'LMB',n:'Machine Pistol',d:'Short-range automatic weapon.'},{k:'RMB',n:'Hack',d:'Hold to hack. Hacked enemies cannot use abilities and can be seen through walls. Hacked health packs spawn faster and can\'t be used by enemies. Taking damage interrupts the hack attempt.'},{k:'Shift',n:'Virus',d:'Infect enemies with a projectile that deals damage over time. Virus damages hacked targets at a faster rate.'},{k:'E',n:'Translocator',d:'Throw a beacon and teleport to it. Become stealthed for a short duration after teleporting.'},{k:'Q',n:'EMP',d:'Deal damage to all nearby enemies based on their current health, hacking them and destroying barriers around you.',u:1,va:'"EMP activated!"',ve:'"¡Apagando las luces!" (Spanish)'}],
pk:[{t:'Minor',n:'Encrypted Upload',d:'Hack can be used while invisible, successful hacks increase the duration of stealth by 3 seconds.'},{t:'Minor',n:'CTRL ALT ESC',d:'Teleporting with Translocator while below half health initiates passive health regeneration.'},{t:'Major',n:'High-Speed Bandwidth',d:'Hacked health packs grant allies 25% movement speed and 50 overhealth for 4 seconds.'},{t:'Major',n:'Viral Replication',d:'Hitting a hacked enemy with Virus spreads Virus to enemies within 8 meters.'}],
st:"Sombra's hack is the most impactful single targeted ability in the game — it removes every ability from a hero for several seconds, neutering tanks, supports, and DPS alike. EMP during a teamfight simultaneously resets enemy abilities, destroys barriers, and allows the team to fight ability-less enemies. Opportunist through-wall vision makes her the best team information gatherer.",
ct:{tank:"Doomfist: Power Block absorbs Machine Pistol; EMP's timing window is tight against Meteor Strike. — Widowmaker: Grappling Hook repositions before hack completes its cast. — Wrecking Ball: Ball momentum makes hack cast time unreliable; Piledriver disrupts her positioning.",dps:"",sup:""}},

{r:'dps',sr:'Specialist',n:'Symmetra',sl:'symmetra',nat:'India',fl:'in',
ov:"A barrier-ignoring Specialist whose auto-locking beam scales to devastating damage and Teleporter enables team-wide instant repositioning. Sentry Turrets act as both zoning tools and flanking-route warning systems.",
ab:[{k:'LMB',n:'Photon Projector',d:'Short-range beam weapon with increasing damage.'},{k:'RMB',n:'Photon Projector Alt Fire',d:'Hold to charge, release to fire explosive orb.'},{k:'Shift',n:'Sentry Turret',d:'Deploy a small turret that damages and slows enemies.'},{k:'E',n:'Teleporter',d:'Create two temporary teleporters that enable instance travel between them.'},{k:'Q',n:'Photon Barrier',d:'Deploy a massive energy barrier.',u:1,va:'"Reality bends to my will!"',ve:'"Yahi param vāstavikatā hai!" (Hindi)'}],
pk:[{t:'Minor',n:'Sentry Capacity',d:'Sentry Turret gains an additional charge.'},{t:'Minor',n:'Perfect Alignment',d:'Increase the range of Photon Projector\'s primary fire by 20%.'},{t:'Major',n:'Hovering BarrierE',d:'Teleporter gains the option to create a forward moving barrier instead. Pressing Ability 2 again slows down the barrier\'s movement.'},{t:'Major',n:'Shield Battery',d:'Symmetra regenerates 20 shields per second while within 10 meters of her teleporter.'}],
st:"Photon Projector at full charge deals more DPS than most heroes while requiring zero aim — she simply needs to maintain beam contact. Teleporter is the only ability in the game enabling team-wide instant repositioning, enabling creative flanks and surprise angles. Sentry Turrets act as motion sensors and slow fields that give advance warning of incoming flanks.",
ct:{tank:"D.Va: Defense Matrix absorbs her Photon Orbs; Boosters break beam contact. — Genji: Deflect returns beam damage; Swift Strike breaks turret clusters. — Hazard: Vault reaches turret positions; Jagged Wall splits her beam coverage area.",dps:"",sup:""}},

{r:'dps',sr:'Specialist',n:'Torbjörn',sl:'torbjorn',nat:'Sweden',fl:'se',
ov:"A zone-denial Specialist whose self-tracking turret punishes enemies in chokepoints while Molten Core lays impassable lava pools. His Overload temporarily makes him a surprisingly dangerous frontline duelist on top of his existing turret pressure.",
ab:[{k:'LMB',n:'Rivet Gun',d:'Slow firing, long-ranged weapon.'},{k:'RMB',n:'Rivet Gun Alt Fire',d:'Inaccurate but powerful short-range weapon.'},{k:'LMB (alt)',n:'Forge Hammer',d:'Swing to repair your turret or damage an enemy.'},{k:'Shift',n:'Deploy Turret',d:'Deploy a self-building turret.'},{k:'E',n:'Overload',d:'Gain additional extra health as well as improved attack, movement, and reload speed.'},{k:'Q',n:'Molten Core',d:'Create pools of molten slag that damage enemies. Deals additional damage to armor.',u:1,va:'"Setting up the welcome mat."',ve:'"MOLTEN CORE!"'}],
pk:[{t:'Minor',n:'Hammer Time',d:'Move 20% faster while Forge Hammer is equipped.'},{t:'Minor',n:'Pre-Heated',d:'Molten Core activates Overload.'},{t:'Major',n:'Anchor Bolts',d:'Deploy Turret\'s throw range is increased by 50% and it can now attach to walls and ceilings.'},{t:'Major',n:'Overloaded Turret',d:'Overload upgrades your Turret for 5 seconds, increasing its health and damage.'}],
st:"A well-placed turret in a chokepoint provides persistent damage that forces enemies to commit resources to clearing it before pushing. Molten Core's lava pools can physically block entire corridors — enemies must navigate around or through significant damage to advance. His Overload buff during Molten Core makes him a surprisingly dangerous duelist.",
ct:{tank:"Junkrat: Grenade arc destroys the turret from angles it can't track. — Jetpack Cat: Aerial positioning removes the turret's effective fire range entirely. — Roadhog: Hook pulls him away from the turret's protection radius.",dps:"",sup:""}},

{r:'dps',sr:'Flanker',n:'Tracer',sl:'tracer',nat:'UK',fl:'gb',
ov:"The iconic harassment Flanker who blinks around at extreme speed and rewinds her state with Recall. Three Blink charges mean she can dodge in three different directions in under a second, and Recall negates any burst combo from the last three seconds.",
ab:[{k:'LMB',n:'Pulse Pistols',d:'Short-range automatic weapons.'},{k:'Shift',n:'Blink',d:'Teleport in the direction you are moving.'},{k:'E',n:'Recall',d:'Travel back in time to your previous location and health.'},{k:'Q',n:'Pulse Bomb',d:'Throw out a powerful sticky explosive.',u:1,va:'"Special Delivery!"',ve:'"Special Delivery!"'}],
pk:[{t:'Minor',n:'Chronal Dash',d:'Blink distance increased by 20%.'},{t:'Minor',n:'Kinetic Reload',d:'Melee hits grant 20 ammo.'},{t:'Major',n:'Blink Packs',d:'Health Packs restore 1 Blink charge.'},{t:'Major',n:'Quantum Entanglement',d:'Recall grants 50 overhealth and 20 ammo that decays over time.'}],
st:"Recall is one of the most powerful panic buttons in the game — she can negate any burst combo from the last 3 seconds, including sleep darts, hooks, and burst damage windows. Three Blink charges mean she can dodge in three different directions in under a second. Pulse Bomb deals enough damage to instantly eliminate most supports and lower-health DPS heroes.",
ct:{tank:"Widowmaker: One-shots her 175 HP pool the moment she pauses after Recall. — Mauga: Cardiac Overdrive heals through her burst; Overrun catches her repositioning. — Illari: Outpost Pylon keeps allies topped despite her harassment; Solar Rifle matches her range.",dps:"",sup:""}},

{r:'dps',sr:'Flanker',n:'Vendetta',sl:'vendetta',nat:'Italy',fl:'it',
ov:"The game's only melee DPS — a gladiatorial Flanker whose overhead sword swing bypasses tank damage reduction entirely. Onslaught stacks transform her into an increasingly faster killing machine the longer she stays in combat.",
ab:[{k:'Passive',n:'Onslaught',d:'Strike enemies to increase movement and attack speed.'},{k:'LMB',n:'Palatine Fang',d:'Hard-light greatsword. Combo swings to end with a destructive overhead slash.'},{k:'RMB',n:'Warding Stance',d:'Block with your sword, reducing frontal damage and deflecting melee attacks. Blocking damage depletes energy.'},{k:'LMB (alt)',n:'Projected Edge',d:'Available when Warding Stance is active. Consume energy to fire a wide projectile.'},{k:'Shift',n:'Whirlwind Dash',d:'Rush forward into a circular slash.'},{k:'E',n:'Soaring Slice',d:'Hurl your sword in the direction you are facing and then fly to it.'},{k:'Q',n:'Sundering Blade',d:'Cleave through most defenses, dealing severe damage to enemies in front of you.',u:1,va:'[CONFIRM ally line]',ve:'[CONFIRM enemy line]'}],
pk:[{t:'Minor',n:'Raging Storm',d:'Whirlwind Dash continues to spin, hitting 3 more times for 30 damage in a wide area.'},{t:'Minor',n:'Extra Edge',d:'Projected Edge costs 25% less energy.'},{t:'Major',n:'Relentless',d:'Onslaught can stack 3 more times, increasing attack speed by 5% and movement speed by 4% per stack.'},{t:'Major',n:'Siphoning Strike',d:'Overhead strikes gain 30% Lifesteal.'}],
st:"Her overhead swing bypasses tank damage reduction entirely — the only damage ability in the game that does so — making her uniquely threatening to even the most fortified targets. Onslaught stacks transform her into an increasingly faster killing machine the longer she stays in combat. Warding Stance lets her block incoming melee from heroes like Reinhardt and Doomfist, completely negating their primary damage.",
ct:{tank:"Winston: Barrier Projector tanks her overhead strikes; Tesla Cannon ignores Warding Stance. — Wrecking Ball: Piledriver launches her airborne and resets Onslaught stacks. — Zenyatta: Discord Orb makes her extremely fragile; Transcendence sustains through Last Stand.",dps:"",sup:""}},

{r:'dps',sr:'Flanker',n:'Venture',sl:'venture',nat:'Canada',fl:'ca',season:'S10 · Apr 2024',
ov:"A close-range Flanker who burrows underground for full invulnerability, then emerges to launch enemies skyward. Explorer's Resolve generates temporary shields from ability use, and Tectonic Shock covers enormous ground area for a DPS ultimate.",
ab:[{k:'V',n:'Clobber',d:'Quick melee deals more damage.'},{k:'Passive',n:'Explorer\'s Resolve',d:'Using abilities grants temporary shields.'},{k:'LMB',n:'Smart Excavator',d:'Launch a seismic charge that bursts after a short distance.'},{k:'RMB',n:'Drill Dash',d:'Dash forward while above or underground, pushing enemies back. The cooldown is accelerated while underground.'},{k:'Shift',n:'Burrow',d:'Move underground and become invulnerable. Emerge to deal damage.'},{k:'Q',n:'Tectonic Shock',d:'Send out damaging shockwaves.'}],
pk:[{t:'Minor',n:'Deep Burrow',d:'Drill Dash distance is 50% longer while while burrowing.'},{t:'Minor',n:'Excavation Exhilaration',d:'While Tectonic Shock is active, cooldowns refresh 300% faster.'},{t:'Major',n:'Smart ExtenderE',d:'Empower SMART Excavator with E to increase its maximum projectile range by 100% for 4 seconds.'},{t:'Major',n:'Covered in Dirt',d:'Dealing damage with Clobber grants up to 30 Explorer\'s Resolve shields.'}],
st:"Burrow provides a unique full invulnerability window that can be used both offensively and defensively — burrowing under an enemy team and emerging in their midst is extremely disorienting. Tectonic Shock's wide ground-shockwave covers enormous area and pairs well with any setup ultimate. Explorer's Resolve shield generation makes them surprisingly durable in sustained fights.",
ct:{tank:"Symmetra: Beam bypasses Burrow invulnerability's emergence and auto-locks. — Jetpack Cat: Aerial height denies Drill Dash approach entirely. — Baptiste: Immortality Field prevents the Burrow-emerge kill combo.",dps:"",sup:""}},

{r:'dps',sr:'Sharpshooter',n:'Widowmaker',sl:'widowmaker',nat:'France',fl:'fr',
ov:"The best long-range Sharpshooter in the game whose fully-charged headshot instantly eliminates most non-tank heroes. Infra-Sight grants her entire team wall-hack vision, and Venom Mine covers flanking routes with revealed poison damage.",
ab:[{k:'LMB',n:'Widow\'s Kiss',d:'Automatic assault weapon.'},{k:'RMB',n:'Widow\'s Kiss (ADS)',d:'Hold for long-ranged sniper weapon.'},{k:'Shift',n:'Grappling Hook',d:'Launch a hook that pulls you towards a ledge.'},{k:'E',n:'Venom Mine',d:'Launch a poison trap.'},{k:'Q',n:'Infra-Sight',d:'Provide your team with a view of the enemy\'s location.',u:1,va:'"No one can hide from my sight."',ve:'"Personne n\'échappe à mon regard." (French)'}],
pk:[{t:'Minor',n:'Scoped Efficiency',d:'Scoped shots cost 3 ammo instead of 5.'},{t:'Minor',n:'Sniper\'s Instinct',d:'Scoped shots charge 100% faster for 2 seconds after using Grappling Hook.'},{t:'Major',n:'Widow’s Bite',d:'Scoped shots can charge up to 125%, piercing enemies when fully charged.'},{t:'Major',n:'Seeker Mine',d:'Venom Mine now fires poison darts at enemies within 10 meters and remains active after triggered.'}],
st:"A skilled Widowmaker creates permanent map control — enemies must constantly move or die, which disrupts any composition that relies on holding angles. Infra-Sight gives her entire team wallhack information for a substantial duration, enabling coordinated attacks through walls. Venom Mine at flanking routes gives her advance warning against Tracer and Genji approaches.",
ct:{tank:"Brigitte: Shield Bash punishes her repositioning; armor absorbs chip damage forcing grapple. — Mauga: Overrun closes distance before she can grapple away; large body absorbs shots. — Domina: Photon Magnum out-ranges her scoped shots; Barrier Array denies sightlines.",dps:"",sup:""}},
];

<script id="sup-data">
const SUPPORTS=[
{r:'sup',sr:'Tactician',n:'Ana',sl:'ana',nat:'Egypt',fl:'eg',
ov:"The highest-impact support in skilled hands — Biotic Grenade applies anti-heal to all enemies hit while amplifying allied healing, Sleep Dart stops any channeled ultimate mid-animation, and Nano Boost supercharges an ally as a coordinated teamfight trigger.",
ab:[{k:'LMB',n:'Biotic Rifle',d:'Long-range rifle that heals allies and damages enemies.'},{k:'RMB',n:'Zoom (ADS)',d:'Weapon (ADS) Hold to zoom in.'},{k:'Shift',n:'Sleep Dart',d:'Fires a dart that puts an enemy to sleep.'},{k:'E',n:'Biotic Grenade',d:'Throws a grenade that heals and increases healing on allies, while damaging and preventing healing on enemies.'},{k:'Q',n:'Nano Boost',d:'Increases an ally\'s damage, while reducing damage taken.'}],
pk:[{t:'Minor',n:'Groggy',d:'Enemies waking up from Sleep Dart are slowed and take 50 damage for 2 seconds.'},{t:'Minor',n:'Speed Serum',d:'Nano Boost grants a 40% movement speed boost to both Ana and her target.'},{t:'Major',n:'Headhunter',d:'Biotic Rifle can crit enemies.'},{t:'Major',n:'Biotic Bounce',d:'After exploding, Biotic Grenade bounces and explodes again for 60 damage and healing.'}],
st:"Biotic Grenade is the single most impactful non-ultimate ability in the game — anti-heal strips self-sustaining tanks and makes them trivially easy to kill. Sleep Dart is a powerful panic button that can stop channeled ultimates like Dragonblade or Whole Hog mid-animation. Nano Boost's amplification functions as a fight-starting signal that coordinates the entire team.",
ct:{tank:"Mauga: Cardiac Overdrive heals through Sleep Dart's setup window. — Roadhog: Hook reaches her before she can reposition; Take a Breather negates anti-heal. — Jetpack Cat: Aerial repositioning makes Biotic Rifle precision very difficult.",dps:"",sup:""}},

{r:'sup',sr:'Tactician',n:'Baptiste',sl:'baptiste',nat:'Haiti',fl:'ht',
ov:"A flexible combat medic who prevents deaths entirely with Immortality Field and doubles allied damage and healing through Amplification Matrix. Exo Boots propel him to high ground other supports cannot reach without help.",
ab:[{k:'Ctrl',n:'Exo Boots',d:'Hold crouch to jump higher.'},{k:'LMB',n:'Biotic Launcher',d:'Three-round burst gun.'},{k:'RMB',n:'Biotic Launcher Alt Fire',d:'Lob a healing projectile that heals all allies near the impact.'},{k:'Shift',n:'Regenerative Burst',d:'Activate to heal yourself and nearby allies instantly, with additional healing over time. Instant heal is doubled for targets less than half health.'},{k:'E',n:'Immortality Field',d:'Toss a device that prevents allies from dying. The device can be destroyed.'},{k:'Q',n:'Amplification Matrix',d:'Project a matrix that doubles the damage and healing of allied projectiles.',u:1,va:'"Light them up!"',ve:'"Vide bal sou yo!" (Haitian Creole)'}],
pk:[{t:'Minor',n:'Assault Burst',d:'Regenerative Burst now provides Baptiste with 20% increased attack speed for 3 seconds.'},{t:'Minor',n:'Expanded Field',d:'Immortality Field radius increased by 30%.'},{t:'Major',n:'Automated Healing',d:'Using any ability triggers Baptiste\'s Shoulder Turret, periodically firing up to 3 shots at allies, each restoring 25 health.'},{t:'Major',n:'Rocket BootsSPACE',d:'While airborne from Exo Boots, use (SPACE) to dash horizontally.'}],
st:"Immortality Field prevents deaths entirely — it changes the calculus of any teamfight by making it impossible to wipe the team through pure burst damage. Amplification Matrix effectively doubles the DPS and healing of everyone firing through it, making it one of the most fight-skewing non-healing ultimates in the game. His burst weapon deals competitive DPS compared to actual damage heroes.",
ct:{tank:"Pharah: Float above Immortality Field's coverage and bomb it directly. — Anran: Burn damage destroys Immortality Field device quickly. — Sigma: Kinetic Grasp absorbs Biotic Launcher burst; Gravitic Flux bypasses Immortality Field.",dps:"",sup:""}},

{r:'sup',sr:'Survivor',n:'Brigitte',sl:'brigitte',nat:'Sweden',fl:'se',
ov:"The best anti-flanker support, purpose-built to counter dive. Inspire provides passive AoE healing to frontline allies without requiring aim, Shield Bash stuns Genji mid-Dragonblade, and Rally builds armor on the entire nearby team.",
ab:[{k:'Passive',n:'Inspire',d:'Dealing damage to enemies heals nearby allies.'},{k:'LMB',n:'Rocket Flail',d:'Melee weapon with extended range.'},{k:'RMB',n:'Barrier Shield',d:'to deploy a frontal energy barrier.'},{k:'LMB (alt)',n:'Shield Bash',d:'Available when Barrier Shield is deployed. Dash forward to knock back an enemy.'},{k:'Shift',n:'Whip Shot',d:'Launch your flail forward to knock an enemy away from you.'},{k:'E',n:'Repair Pack',d:'Heals an ally for a short duration.'},{k:'Q',n:'Rally',d:'Gain armor, empower Barrier Shield and provide extra health to nearby allies.',u:1,va:'"Rally to me!"',ve:'"Alla till mig!" (Swedish)'}],
pk:[{t:'Minor',n:'Combat Medic',d:'Melee attacks reduce the cooldown of Repair Pack by 0.75 seconds.'},{t:'Minor',n:'Morale Boost',d:'Inspire lasts 3 seconds longer when activated by Whip Shot.'},{t:'Major',n:'Inspiring Strike',d:'Shield Bash grants 30% increased movement speed for 2 seconds. Inspire\'s healing is instant when activated by Shield Bash.'},{t:'Major',n:'Whiplash',d:'Whip Shot\'s knockback can slam enemies into walls, dealing 50 extra damage.'}],
st:"Brigitte is specifically designed to counter dive and flanker heroes — Inspire provides passive AoE healing to frontline allies without needing to aim, while Shield Bash interrupts Genji's Dragonblade and Tracer's Recall timing. Repair Pack overheals as armor, giving key allies extra effective health. Rally's armor is additive and powerful for sustained brawl pushing.",
ct:{tank:"Winston: Barrier Projector tanks her melee; Tesla Cannon ignores armor. — Sombra: Hack removes Inspire, Barrier Shield, and Shield Bash simultaneously. — Wrecking Ball: Piledriver disrupts her melee range; Adaptive Shield ignores her burst.",dps:"",sup:""}},

{r:'sup',sr:'Survivor',n:'Illari',sl:'illari',nat:'Peru',fl:'pe',
ov:"An offensive Survivor support whose auto-charging Solar Rifle rivals DPS hero output while Healing Pylon manages healing autonomously. Captive Sun marks slowed enemies to explode on taking further damage, creating a second kill window after initial hits.",
ab:[{k:'LMB',n:'Solar Rifle',d:'Long-range auto charging rifle.'},{k:'RMB',n:'Solar Rifle Alt Fire',d:'Medium range healing beam that consumes solar energy.'},{k:'Shift',n:'Outburst',d:'Launches you in the direction you are moving. Knocking back enemies. Hold jump to go higher.'},{k:'E',n:'Healing Pylon',d:'Deploy a pylon that heals allies.'},{k:'Q',n:'Captive Sun',d:'Fire an explosive ball of solar energy. Enemies hit are slowed and explode after taking significant damage.'}],
pk:[{t:'Minor',n:'Rapid Construction',d:'Healing Pylon builds 300% faster and its cooldown is reduced by 1.5 seconds.'},{t:'Minor',n:'Summer Solstice',d:'Activating Captive Sun grants Illari 3 extra seconds of flight, 20% increased flight speed, and 20% increased attack speed.'},{t:'Major',n:'Solar Flare',d:'Press Primary Fire while using Solar Rifle\'s healing beam to heal all allies in front of Illari for 100 healing.'},{t:'Major',n:'Sunburn',d:'Outburst ignites enemies, dealing an additional 50 damage over 3 seconds.'}],
st:"Her auto rifle damage can contest DPS heroes while Pylon simultaneously manages healing, freeing her to play aggressively. Captive Sun's marked detonation creates a second kill window after initial damage — any follow-up from teammates instantly triggers the explosion on marked enemies. High solo-carry potential compared to most support heroes.",
ct:{tank:"Orisa: Fortify tanks her rifle; javelin pushes her out of Healing Pylon range. — Domina: Barrier Array absorbs Outburst; Photon Magnum matches her sniper range. — Sigma: Kinetic Grasp absorbs Solar Rifle burst; Experimental Barrier covers Pylon angles.",dps:"",sup:""}},

{r:'sup',sr:'Tactician',n:'Jetpack Cat',sl:'jetpack-cat',nat:'Unknown',fl:null,
ov:"The only hero with permanent passive flight, making her immune to all ground-level threats. Lifeline tows an ally through the air while healing them, Purr provides pulsing area healing that intensifies over time, and Catnapper dives to the ground to tether the nearest enemy.",
ab:[{k:'Passive',n:'Jetpack',d:'Permanent flight.'},{k:'LMB',n:'Biotic Pawjectiles',d:'Mid-range projectile spread that heals allies and damages enemies.'},{k:'RMB',n:'Frenetic Flight',d:'Accelerate in your movement direction. Fuel recovery is slower while carrying another player.'},{k:'Shift',n:'Lifeline',d:'Toggle into transport mode, allowing an ally to be towed. Increases movement speed and heals your ally.'},{k:'E',n:'Purr',d:'Pulsing area heal that increases in frequency over time. Knockback nearby enemies when activated.'},{k:'Q',n:'Catnapper',d:'Dive towards a ground location, knocking down enemies and tethering the nearest one to you.',u:1,va:'[CONFIRM ally line]',ve:'[CONFIRM enemy line]'}],
pk:[{t:'Minor',n:'Ulterior Motive',d:'15% of Biotic Pawjectiles healing is converted into fuel.'},{t:'Minor',n:'Transport Shielding',d:'Gain up to 75 shield health while carrying another hero.'},{t:'Major',n:'Headbutt',d:'Frenetic Flight can knockback an enemy on impact when flying fast enough. Generate 25% fuel on knockback'},{t:'Major',n:'Claws OutV',d:'Quick Melee becomes empowered every 6 seconds, wounding enemies for 40 damage and slowing them by 30% for 1 second.'}],
st:"Permanent passive flight makes Jetpack Cat immune to all ground-based threats — sweepers, slows, hooks, and melee heroes cannot reach her. Lifeline's tow can save an ally from a hook, a Death Blossom, or any ground-level threat in a single moment. Her Tactician passive allows banking ultimate charge, making critical ultimates available sooner.",
ct:{tank:"Reaper: Shotgun burst at his engagement range exceeds her healing output. — Torbjorn: Turret tracks her aerial movement automatically. — Bastion: Artillery mode reaches her flight ceiling from anywhere on the map.",dps:"",sup:""}},

{r:'sup',sr:'Survivor',n:'Juno',sl:'juno',nat:'Mars (Vietnamese descent)',fl:null,
ov:"An extremely mobile Survivor support who grants speed boosts through Hyper Ring, heals and damages with homing Pulsar Torpedoes, and boosts the whole team's damage with Orbital Ray. Her Martian Overboots allow double-jumping and hovering.",
ab:[{k:'Space',n:'Martian Overboots',d:'While airborne, press Jump to double jump and hold Jump to hover.'},{k:'LMB',n:'Mediblaster',d:'Burst fire weapon that heals allies and damages enemies.'},{k:'RMB',n:'Pulsar Torpedoes',d:'Press Secondary Fire to lock on, then Primary Fire to fire homing projectiles. Heals allies over time and damages enemies.'},{k:'Shift',n:'Glide Boost',d:'Glide horizontally with increased movement speed.'},{k:'E',n:'Hyper Ring',d:'Deploy a ring that increases movement speed of allies that pass through it.'},{k:'Q',n:'Orbital Ray',d:'Call down a ray that travels forward, healing allies and increasing their damage.',u:1,va:'"Welcome to orbit!"',ve:'"Locking satellite vector!"'}],
pk:[{t:'Minor',n:'Familiar Vitals',d:'Pulsar Torpedoes lock onto allies 35% faster.'},{t:'Minor',n:'Locked On',d:'Reduce the cooldown of Pulsar Torpedoes by 1 second for each enemy hit.'},{t:'Major',n:'Faster Blaster',d:'While using Glide Boost, Mediblaster fires continuosly.'},{t:'Major',n:'Lift Off',d:'Martian Overboots can now triple jump.'}],
st:"Hyper Ring's speed boost enables dive compositions to close the gap or rush objectives faster than the enemy can react. Pulsar Torpedoes are one of the only homing healing abilities in the game, letting her heal allies she cannot maintain line-of-sight to. Orbital Ray's damage boost combined with Ana's Nano Boost on the same target is one of the highest burst windows in the game.",
ct:{tank:"Hazard: Violent Leap closes distance before Glide Boost can escape. — Mizuki: Binding Chain grounds her mid-Glide Boost; Remedy Aura out-sustains Pulsar Torpedoes. — Reaper: Shotgun burst exceeds Hyper Ring's speed advantage at close range.",dps:"",sup:""}},

{r:'sup',sr:'Medic',n:'Kiriko',sl:'kiriko',nat:'Japan',fl:'jp',
ov:"One of the strongest supports at all levels — Protection Suzu cleanses virtually any debuff in the game including mid-ultimate effects, Swift Step teleports through any terrain to any ally, and Kitsune Rush dramatically accelerates the entire team.",
ab:[{k:'Space',n:'Wall Climb',d:'Jump at walls to climb up them.'},{k:'LMB',n:'Healing Ofuda',d:'Channel a burst of healing talismans that can seek targeted allies.'},{k:'RMB',n:'Kunai',d:'Thrown long-ranged projectile.'},{k:'Shift',n:'Swift Step',d:'Teleport directly to an ally.'},{k:'E',n:'Protection Suzu',d:'Throw a protective charm to make allies become briefly invulnerable and cleansed of most negative effects.'},{k:'Q',n:'Kitsune Rush',d:'Summon a fox spirit that rushes forward, accelerating the movement, attack speed, and cooldowns of allies that follow its path.',u:1,va:'"Let the Kitsune guide you!"',ve:'"Kitsune no kagizume wo tokihanate!" (Japanese)'}],
pk:[{t:'Minor',n:'Urgent Care',d:'Healing Ofuda projectile speed is increased by 50% when seeking critical health allies.'},{t:'Minor',n:'Fortune Teller',d:'Kunai hits launch 2 Healing Ofuda to an ally in front of you.'},{t:'Major',n:'Ready Step',d:'Swift Step grants Kiriko 40% increased attack and reload speed for 3 seconds.'},{t:'Major',n:'Foxtrot',d:'Protection Suzu grants allies 30% increased movement speed for 4 seconds.'}],
st:"Suzu cleanses virtually every debuff in the game — it can remove anti-heal from Ana's grenade, freeze from Mei, sleep, hack from Sombra, and even cleanse teammates caught in Gravitic Flux mid-ult. Swift Step teleports through any terrain to save allies from flankers or perilous positions. Kitsune Rush's combined attack speed, movement speed, and cooldown reduction makes it one of the most impactful teamfight ultimates in the game.",
ct:{tank:"Vendetta: Overhead strike bypasses her armor; Onslaught speed closes gap before Swift Step. — Venture: Burrow approach denies Swift Step escape routes. — Ana: Sleep Dart stops her mid-Swift Step animation.",dps:"",sup:""}},

{r:'sup',sr:'Medic',n:'Lifeweaver',sl:'lifeweaver',nat:'Thailand',fl:'th',
ov:"A repositioning Medic specialist who pulls allies from danger with Life Grip, creates on-demand high ground with Petal Platform, and deploys a massive healing Tree of Life. He also has Rejuvenating Dash as a self-sustaining movement ability.",
ab:[{k:'LMB',n:'Healing Blossom',d:'Hold to charge a healing burst. Release to heal a targeted ally. Passively charges at a reduced rate while not in use.'},{k:'RMB',n:'Thorn Volley',d:'Rapidly fire a spread of projectiles.'},{k:'Shift',n:'Petal Platform',d:'Throw a platform that springs upwards when stepped on. Resets when not in use.'},{k:'Space',n:'Rejuvenating Dash',d:'Dash towards your traveling direction and lightly heal yourself.'},{k:'E',n:'Life Grip',d:'Pull an ally to your location, protecting them as they travel.'},{k:'Q',n:'Tree of Life',d:'Place a tree that instantly heals allies upon sprouting and continues healing periodically as it lives.',u:1,va:'"Life protects life!"',ve:'"Chīwit bpkpong chīwit!" (Thai)'}],
pk:[{t:'Minor',n:'Petal Protection',d:'Allies heal 20 health per second while standing on Petal Platform.'},{t:'Minor',n:'Dashing Escape',d:'Rejuvenating Dash distance increased by 30%.'},{t:'Major',n:'Superbloom',d:'Thorns detonate for 40 extra damage when enough stick within 2.5 seconds.'},{t:'Major',n:'Sow the Seed',d:'Quick Melee with Healing Blossom equipped tosses a seed forward. Allies who pick up a seed gain 75 overhealth and 25% movement speed for 5 seconds.'}],
st:"Life Grip is the only ability in the game that can physically relocate an allied hero, enabling saves from hooks, Death Blossoms, Dragonblades, and other kill combos that would otherwise be unavoidable. Petal Platform creates instant high-ground access on any map without needing ramps or staircases. Tree of Life's large health pool means it sustains the team through prolonged pushes.",
ct:{tank:"Ramattra: Annihilation persists through Life Grip since it follows the target. — Reinhardt: Earthshatter bypasses Life Grip's protection window. — Vendetta: Overhead strike bypasses his shields; Onslaught speed prevents Rejuvenating Dash escape.",dps:"",sup:""}},

{r:'sup',sr:'Tactician',n:'Lúcio',sl:'lucio',nat:'Brazil',fl:'br',
ov:"A mobile Tactician support whose Crossfade passively benefits every nearby ally at all times with no aim required. Speed Song enables entire dive compositions to close the gap faster than the enemy can react, and Sound Barrier counters many telegraphed ultimates with instantaneous team-wide shielding.",
ab:[{k:'Passive',n:'Wall Ride',d:'Jump onto a wall to ride along it.'},{k:'LMB',n:'Sonic Amplifier',d:'Sonic projectile launcher.'},{k:'RMB',n:'Soundwave',d:'Create a short-range blast wave to knock enemies away from you.'},{k:'Shift',n:'Crossfade',d:'Switches between two songs: Healing Boost heals nearby allies, and Speed Boost makes nearby allies move faster.'},{k:'E',n:'Amp It Up',d:'Increase the effectiveness of your current song.'},{k:'Q',n:'Sound Barrier',d:'Create temporary extra health for nearby allies.',u:1,va:'"Oh, let\'s break it down!"',ve:'"Vamos esculachar!" (Portuguese)'}],
pk:[{t:'Minor',n:'Soundwave Rider',d:'Wall Riding empowers your next Soundwave, increasing its knockback by 25% and damage by 50%.'},{t:'Minor',n:'Beat Drop',d:'Amp It Up is active during Sound Barrier.'},{t:'Major',n:'Noise Violation',d:'Crossfade\'s range is increased by 150% while Amp It Up is active.'},{t:'Major',n:'Accelerando',d:'Gain 15% attack speed while Lucio\'s Speed Song is active, tripled during Amp It Up.'}],
st:"Crossfade requires no aim and passively benefits every ally within range at all times — Speed Song enables dive compositions to close the gap faster than the enemy can react. Sound Barrier's instantaneous team-wide shielding counters telegraphed ultimates like Earthshatter, Blizzard, and Death Blossom. His Wall Ride mobility makes him one of the hardest supports to eliminate.",
ct:{tank:"Winston: Barrier Projector negates Soundwave boop inside the dome. — Reinhardt: Earthshatter catches Wall Ride momentum on enclosed maps. — Widowmaker: Scoped shots punish Wall Ride paths from any angle.",dps:"",sup:""}},

{r:'sup',sr:'Medic',n:'Mercy',sl:'mercy',nat:'Switzerland',fl:'ch',
ov:"A dedicated Medic with the highest single-target heal rate in the game who amplifies ally damage by 30%. Guardian Angel's angular mobility makes her one of the hardest supports to eliminate when played well, and Resurrect reverses a fight-losing death at any moment.",
ab:[{k:'Passive',n:'Swift Recovery',d:'Begin regenerating health more quickly.'},{k:'Space',n:'Angelic Descent',d:'Fall very slowly.'},{k:'LMB',n:'Caduceus Staff',d:'Hold to increase an ally\'s damage inflicted.'},{k:'LMB (alt)',n:'Caduceus Blaster',d:'Automatic weapon.'},{k:'Shift',n:'Guardian Angel',d:'Fly towards an ally. While in flight, Jump launches you forward, and and Crouch launches you upward.'},{k:'E',n:'Resurrect',d:'Revive a dead teammate.'},{k:'RMB',n:'Flash Heal',d:'Heal Caduceus Staff\'s active target, healing is doubled on allies below half health.'},{k:'Q',n:'Valkyrie',d:'Gain the ability to fly. Abilities are enhanced.',u:1,va:'"Heroes never die!"',ve:'"Helden sterben nicht!" (German)'}],
pk:[{t:'Minor',n:'Angelic Resurrection',d:'Mercy gains 100 overhealth after casting Resurrect.'},{t:'Minor',n:'Divine Momentum',d:'Increases Mercy\'s travel speed by 15% after cancelling Guardian Angel.'},{t:'Major',n:'Chain Boost',d:'Secondary fire links to a second nearby ally.'},{t:'Major',n:'Double Dose',d:'Flash Heal gains an additional charge but its base healing is reduced by 10.'}],
st:"The 30% Damage Boost multiplied by a consistent beam hero (Pharah, Bastion, Hanzo) creates output that exceeds what either hero could produce alone — Pharmercy in particular is a self-sustaining threat. Resurrect reverses a fight-losing death at any moment and can be used freely during Valkyrie. Guardian Angel's angular mobility makes her one of the hardest supports to eliminate when played well.",
ct:{tank:"Reinhardt: Earthshatter catches her during Guardian Angel animations. — Brigitte: Shield Bash disrupts Guardian Angel dashes; armor absorbs Caduceus damage. — Vendetta: Overhead strike bypasses shields; Onslaught closes faster than Guardian Angel.",dps:"",sup:""}},

{r:'sup',sr:'Survivor',n:'Mizuki',sl:'mizuki',nat:'Japan',fl:'jp',
ov:"An aggressive frontline Survivor support whose Remedy Aura heals passively at close range — growing stronger the more actively he fights. Binding Chain grounds airborne heroes, and Kekkai Sanctuary absorbs all incoming enemy projectiles from outside the area.",
ab:[{k:'Passive',n:'Remedy Aura',d:'Heal nearby allies. Healing scales with resource generated by dealing damage and healing.'},{k:'LMB',n:'Spirit Glaive',d:'Throw a spinning blade that impacts enemies and rapidly dealing damage.'},{k:'RMB',n:'Healing Kasa',d:'Throw your hat to heal an ally, bouncing to nearby allies and healing you when it returns.'},{k:'Shift',n:'Katashiro Return',d:'Leap forward, leaving behind a paper doll. Reactivate to return and gain increased movement speed while active.'},{k:'E',n:'Binding Chain',d:'Launch a tethering chain that hinders the first enemy hit.'},{k:'Q',n:'Kekkai Sanctuary',d:'Create a sanctuary that heals allies and absorbs enemy projectiles from outside the area.',u:1,va:'[CONFIRM ally line]',ve:'[CONFIRM enemy line]'}],
pk:[{t:'Minor',n:'Wellspring',d:'Remedy Aura resource generation increased by 25%.'},{t:'Minor',n:'Exposed Soul',d:'Hitting an enemy with Binding Chain increases your damage dealt to them by 30% for 2 seconds.'},{t:'Major',n:'Resonant Return',d:'Healing Kasa bounces one additional time. Each bounce increases its healing by 10.'},{t:'Major',n:'Quickstep',d:'While Katashiro Return is active, allies within Remedy Aura gain 25% increased movement speed.'}],
st:"Binding Chain is uniquely powerful against mobile heroes — it grounds aerial targets like Pharah and Jetpack Cat and hinders flankers like Tracer and Genji, neutralizing the mobility that defines those heroes. Kekkai Sanctuary absorbs entire projectile ultimates like Dragonstrike and RIP-Tire, providing a safe zone that forces enemies to reposition. Remedy Aura rewards aggressive play, healing more the more actively Mizuki fights.",
ct:{tank:"Wrecking Ball: Piledriver disrupts Remedy Aura positioning; Adaptive Shield ignores Binding Chain. — Venture: Burrow approach bypasses Katashiro Return escape. — Mei: Ice Wall blocks Kekkai Sanctuary cast; freeze stops Healing Kasa mid-flight.",dps:"",sup:""}},

{r:'sup',sr:'Medic',n:'Moira',sl:'moira',nat:'Ireland',fl:'ie',
ov:"A self-sufficient Survivor support who deals damage and heals simultaneously with Biotic Orbs operating independently around corners. Fade provides full invulnerability on demand, and Coalescence passes through every barrier in the game.",
ab:[{k:'LMB',n:'Biotic Grasp',d:'Hold to heal all allies in front of you. Consumes biotic energy.'},{k:'RMB',n:'Biotic Grasp Alt Fire',d:'Long range beam weapon. Damage dealt heals you and replenishes your biotic energy.'},{k:'Shift',n:'Fade',d:'Disappear, move faster, and become invulnerable, but you cannot shoot.'},{k:'E',n:'Biotic Orb',d:'Launch a bouncing sphere that either heals nearby allies or damages nearby enemies.'},{k:'Q',n:'Coalescence',d:'Fire a beam that heals allies and damages enemies.',u:1,va:'"Surrender to my will!"',ve:'"Géill do mo thoil!" (Irish)'}],
pk:[{t:'Minor',n:'Destruction\'s Divide',d:'Coalescence can be toggled between pure healing or pure damage, with 30% greater effect.'},{t:'Minor',n:'Ethical Nourishment',d:'Biotic Orb’s first 30 healing is instant on each ally it encounters.'},{t:'Major',n:'Reversal',d:'Reactivating Biotic Orb reverses its direction.'},{t:'Major',n:'Phantom Step',d:'Fade lasts 0.5 seconds longer and boosts jump height by 50%.'}],
st:"Biotic Orbs provide healing or damage that operates independently, bouncing around corners and through terrain without requiring line-of-sight. Coalescence passes through all barriers — it cannot be blocked by Reinhardt's shield, Sigma's barrier, or any other cover. Fade's invulnerability can escape any burst combo, sleep dart, or hook that would otherwise eliminate her.",
ct:{tank:"Sombra: Hack removes Fade entirely — her only escape from any engagement. — Roadhog: Hook reaches past Fade cooldown; large hitbox absorbs shotgun burst. — Cassidy: Silver Bullet bleed punishes Fade timing; high burst exceeds her healing.",dps:"",sup:""}},

{r:'sup',sr:'Survivor',n:'Wuyang',sl:'wuyang',nat:'China',fl:'cn',season:'S18 · Aug 2025',
ov:"A Tactician support who fires steerable water orbs that heal allies or displace enemies. Guardian Wave pushes enemies back while boosting allied healing received, and Tidal Blast shields then detonates to knock down nearby enemies and massively heal the target.",
ab:[{k:'LMB',n:'Xuanwu Staff',d:'Fire a damaging water orb. Hold to control its trajectory and empower its explosion.'},{k:'RMB',n:'Restorative Stream',d:'Place a passive healing stream on an ally. Hold on the target to manually heal at an improved rate, consuming resource.'},{k:'Shift',n:'Rushing Torrent',d:'Ride water to move faster and jump higher.'},{k:'E',n:'Guardian Wave',d:'Send a water wave forward that increases the amount of healing received by allies and knocks back enemies.',u:1,va:'"Reverse the tide!"',ve:'"Reverse the tide!"'},{k:'Q',n:'Tidal Blast',d:'Protect an ally or yourself with water that detonates after a short duration. The explosion knocks down enemies and massively heals the host target.'}],
pk:[{t:'Minor',n:'Overflow',d:'Gain 10 ammo and 50% healing resource when Rushing Torrent is activated.'},{t:'Minor',n:'Balance',d:'When you deal damage with water orbs, increase Restorative Stream\'s passive healing by 30% for 2 seconds.'},{t:'Major',n:'Ebb and Flow',d:'Guardian Wave rewinds to its starting location. Has 50% less effectiveness while rewinding.'},{t:'Major',n:'Falling Rain',d:'Simultaneously control 3 water orbs that deal 60% decreased damage and have have 25% decreased empowered explosion radius.'}],
st:"Guardian Wave's healing boost combined with a high-healing support composition creates a recovery window that can pull the team back from the edge of a lost fight. Tidal Blast's knockdown disrupts enemy flankers who reach his backline, providing meaningful self-defense. Water Orb's steerability allows him to heal allies behind cover without line-of-sight.",
ct:{tank:"Venture: Burrow bypasses Guardian Wave's pushback entirely. — Juno: Pulsar Torpedoes home through water orb paths; Glide Boost escapes Guardian Wave. — Winston: Barrier Projector tanks orb damage; Tesla Cannon reaches through his water coverage.",dps:"",sup:""}},

{r:'sup',sr:'Tactician',n:'Zenyatta',sl:'zenyatta',nat:'Nepal',fl:'np',
ov:"A high-damage Tactician support who amplifies all damage received by a target via Discord Orb. Transcendence is near-invulnerable team-wide healing that counters Death Blossom, Dragonblade, and Whole Hog, and Snap Kick gives him the most damaging quick melee in the game.",
ab:[{k:'V',n:'Snap Kick',d:'Quick melee damage increased by 50%, and its knockback is significantly increased.'},{k:'LMB',n:'Orb of Destruction',d:'Energy projectile weapon.'},{k:'RMB',n:'Orb of Destruction Alt Fire',d:'Charge to release more projectiles.'},{k:'Shift',n:'Orb of Harmony',d:'Launch this orb at an ally to heal them.'},{k:'E',n:'Orb of Discord',d:'Launch this orb at an enemy to increase the damage they take.'},{k:'Q',n:'Transcendence',d:'Become invulnerable, move faster, and heal nearby allies.',u:1,va:'"Experience tranquility."',ve:'"Pass into the iris."'}],
pk:[{t:'Minor',n:'Discordant Repair',d:'Zenyatta gains 10% lifesteal against enemies affected by Discord Orb.'},{t:'Minor',n:'AscendanceSPACE',d:'Activate and hold Double Jump to hover for up to 3 seconds.'},{t:'Major',n:'Focused Destruction',d:'Secondary fire charges 20% faster and can store 1 extra Orb of Destruction.'},{t:'Major',n:'Dual Harmony',d:'Gain a 2nd Harmony Orb but they both heal for 70% effectiveness.'}],
st:"Discord Orb on a tank can effectively double the damage it receives — even a moderately-fed Zarya dies in seconds when Discorded by a focused team. Transcendence's near-invulnerability and high AoE healing rate counters many of the game's most powerful ultimates — Death Blossom, Dragonblade, and Whole Hog all fail to penetrate it. Among the highest offensive outputs of any support hero when Discord Orb is consistently applied.",
ct:{tank:"Roadhog: Hook one-shots his 250 HP pool before Transcendence can save him. — Zarya: Bubbles save Discord-targeted allies; beam bypasses his orb output. — Symmetra: Beam ignores his line-of-sight requirement and auto-locks through orbs.",dps:"",sup:""}},
];

</script>

<script>
const HERO_ANALYSIS = {
  "dva":{ab:[["Fusion Cannons","high sustained DPS at close range that drains Defense Matrix charge on demand"],["Boosters","closes gaps or escapes instantly, with ram damage that punishes grouped enemies"],["Defense Matrix","deletes incoming projectiles including many ultimates, making her a team-wide defensive anchor"],["Micro Missiles","burst combo layered on top of any other ability, spiking damage in a single window"],["Self-Destruct","forces the entire enemy team to scatter or die, creating space even when it misses"],["Call Mech","second life that resets her threat level and forces enemies to deal with her twice"]],st:"Defense Matrix is one of the only abilities in the game that physically removes projectiles from existence, including many ultimates. Her two-life mechanic forces the enemy to deal with her twice, and Boosters give her unmatched tank mobility for reaching any position on the map instantly.",wk:"Beam weapons bypass Defense Matrix entirely, making Zarya, Symmetra, and Winston reliable counters. Pilot form is fragile — without a fast recall or immediate support, she rarely survives long enough to threaten a second engagement."},
  "domina":{ab:[["Photon Magnum","longest-range tank primary in the game, enabling poke from positions other tanks cannot use"],["Barrier Array","segmented barrier that forces enemies to commit significant damage to clear rather than attacking teammates"],["Crystal Charge","pre-placed detonation that punishes enemies for holding a position"],["Sonic Repulsors","hard displacement that punishes wall-adjacent positioning"],["Panopticon","removes multiple enemies from a fight simultaneously by blocking their damage and healing"]],st:"Her Barrier Array's 27 individual segments force enemies to methodically destroy specific panels rather than shattering the entire shield at once, giving her exceptional defensive staying power. Crystal Charge pierces every barrier in the game, letting her punish fortified comps from complete safety while passively regenerating shields through Reconstruction.",wk:"She has no movement abilities and a massive hitbox, making her entirely position-dependent — if she's caught in the open or flanked, she has no escape. Sombra's EMP simultaneously destroys her array, deletes Panopticon, strips most of her shield health, and locks out the abilities that trigger Reconstruction."},
  "doomfist":{ab:[["Hand Cannon","close-range burst that combos with every ability to spike damage in a single engagement"],["Rocket Punch","wall-slam tool that can eliminate squishy targets from full health in one combo"],["Seismic Slam","launches enemies upward, opening a follow-up window before they land"],["Power Block","absorbs incoming burst to empower the next Rocket Punch, rewarding aggressive reads"],["Meteor Strike","serves equally as an engage opener or a clean disengage from any dangerous position"]],st:"His passive overhealth generation is so rapid through sustained ability use that focused burst damage is the only reliable way to kill him — uncoordinated enemies simply can't outdamage his regeneration. Wall-slam Rocket Punch combos can eliminate most non-tanks from full health in a single chain.",wk:"He is entirely ability-dependent and has almost no sustained damage output between cooldowns. Any disruption to his combo window — a Sleep Dart mid-Seismic Slam, a well-timed Flashbang — resets his entire engagement and leaves him exposed."},
  "hazard":{ab:[["Bonespur","close-range shotgun that feeds ammo to Spike Guard on every shot"],["Violent Leap","covers ground quickly while dealing damage, reaching angles other tanks cannot access"],["Spike Guard","punishes enemies for attacking him at close range with return fire that tracks the attacker"],["Jagged Wall","splits the enemy team or blocks a retreat path at a critical moment"],["Downpour","roots everything in a wide area, creating a guaranteed follow-up window for the whole team"]],st:"Jagged Wall can split an enemy team at a critical moment — separating a support from their tank mid-fight with no warning. Spike Guard makes him dangerous to attack at melee range, returning homing projectiles at anyone who fires on him.",wk:"His Bonespur shotgun is ineffective at range, making him entirely dependent on closing distance in a kit that has no movement ability beyond Violent Leap. Long-range poke compositions can safely chip him down from positions he simply cannot reach."},
  "junker-queen":{ab:[["Scattergun","close-range burst that applies wounds, feeding Adrenaline Rush with every hit"],["Jagged Blade","pulls a wound-marked target directly to her, enabling guaranteed follow-up"],["Carnage","wide arc that applies wounds to every enemy in range simultaneously"],["Commanding Shout","temporary health boost that gives the entire nearby team extra bulk during a push"],["Rampage","prevents all healing on every enemy in her path — fight-winning in a chokepoint"]],st:"Adrenaline Rush provides near-continuous self-healing as long as she's applying wounds, making her almost impossible to outdamage in a sustained close-range fight. Rampage stacks with external anti-heal and shuts down sustain-heavy compositions entirely.",wk:"Kiriko's Suzu cleanses all bleed instantly, completely shutting off Adrenaline Rush and making her significantly easier to kill. She has no barrier and no mobility outside of Rampage, so spread positioning and range neutralise her almost completely."},
  "mauga":{ab:[["Incendiary Chaingun","ignites enemies on critical hits, synergising with Cardiac Overdrive to heal the team"],["Volatile Chaingun","AoE explosive rounds that shred barriers and punish grouped targets"],["Overrun","unstoppable charge that launches enemies and repositions him instantly"],["Cardiac Overdrive","makes the entire nearby team heal through dealing damage, multiplying effective healing output"],["Cage Fight","traps nearby enemies in a confined space where his close-range dominance is absolute"]],st:"Cardiac Overdrive effectively multiplies the healing capacity of the whole team, making a sustained brawl against him almost impossible to win without anti-heal. Cage Fight forces enemies into the close range where his chainguns are most devastating.",wk:"Sombra's Hack shuts off Cardiac Overdrive entirely, cutting both his self-sustain and team heal simultaneously. His large hitbox makes Discord Orb and focused burst significantly more punishing than against most tanks."},
  "orisa":{ab:[["Fusion Driver","no damage falloff at any range, enabling sustained poke from positions other tanks cannot use"],["Fortify","brief damage reduction and crowd control immunity that lets her walk through most burst combos"],["Javelin Spin","deflects entire projectile volleys and destroys obstacles while maintaining forward movement"],["Energy Javelin","stuns and repositions a single target, with bonus damage on wall contact"],["Terra Surge","pulls the enemy team to a single point, setting up instant follow-up from allied DPS"]],st:"Her primary weapon has no falloff and no ammo limit, giving her the best sustained ranged output of any tank. Javelin Spin makes her nearly immune to projectile-based ultimates — a class of defensive tool few other heroes can replicate.",wk:"Beam weapons pass straight through Javelin Spin and cannot be deflected. Her low mobility means a well-executed dive that bypasses Fortify's window catches her completely exposed with no escape option."},
  "ramattra":{ab:[["Void Accelerator","consistent mid-range projectile stream that rewards precise aim in Omnic Form"],["Pummel","rapid fist strikes in Nemesis Form that bypass barriers and deal massive damage"],["Nemesis Form","transforms him into a melee brawler with extra health and armor for eight seconds"],["Void Barrier","repositionable hard-light barrier that can be placed at a target location rather than held"],["Ravenous Vortex","gravity field that pulls enemies to the ground, setting up Annihilation or Nemesis Form"],["Annihilation","near-unkillable sustained damage aura that extends as long as enemies stay near him"]],st:"Annihilation is one of the highest-impact tank ultimates in the game — he becomes near-unkillable while dealing sustained AoE damage that extends indefinitely as long as enemies stay close. Ravenous Vortex pairs perfectly with it, pulling enemies into the aura before it even begins.",wk:"He has no self-sustain in either form outside of Nemesis Form's armour, making him vulnerable to burst between form switches. Dive heroes can reach his supports from angles his melee can't address, and Kinetic Grasp absorbs Ravenous Vortex projectiles entirely."},
  "reinhardt":{ab:[["Rocket Hammer","enormous melee arc that clears close-range threats and punishes enemies who push through the barrier"],["Barrier Field","absorbs all incoming damage for the team, enabling safe advancement through any chokepoint"],["Charge","pins a single target and slams them into a wall for massive damage, punishing overextension"],["Fire Strike","pierces through barriers to maintain threat and ultimate charge from behind cover"],["Earthshatter","knocks down every enemy in a wide cone, winning teamfights outright when it lands on a grouped team"]],st:"A coordinated team behind his barrier is effectively immune to all projectile damage, making him dominant in any push-forward composition on chokepoint-heavy maps. Fire Strike's wall penetration lets him deal consistent damage and build ultimate charge from behind complete cover.",wk:"Sombra's Hack drops Barrier Field instantly with no counterplay. Junkrat, Pharah, and Bastion all bypass or destroy his shield from angles he cannot cover, and his slow movement speed makes repositioning under pressure very difficult."},
  "roadhog":{ab:[["Scrap Gun","massive close-range burst that finishes most non-tanks immediately after a hook"],["Scrap Gun (alt)","extends threat range to punish targets sitting just outside hook distance"],["Chain Hook","reaches past grouped teammates to isolate a specific target and drag them into kill range"],["Take a Breather","mid-fight health reset without healer dependency, winning attrition wars other tanks cannot"],["Whole Hog","pushes enemies off objectives or ledges, punishing teams holding tight ground"]],st:"Chain Hook reaches past grouped teammates to isolate a specific target regardless of their positioning — supports, snipers, and flankers all die to the follow-up combo at close range. Take a Breather restores so much health that he can effectively reset mid-fight without any healer attention.",wk:"Ana's Biotic Grenade during the inhale reduces Take a Breather to near-nothing, turning his signature survival tool into a 1.5-second vulnerability window. A spread team that respects hook distance and stays outside his effective range can neutralise him almost entirely without swapping."},
  "sigma":{ab:[["Hyperspheres","AoE implosion projectiles that reward positional awareness and arc prediction"],["Experimental Barrier","freely repositionable floating shield that can be guided to any angle on demand"],["Kinetic Grasp","converts incoming projectile damage into temporary overhealth, including some ultimates"],["Accretion","knocks a single target down, creating a brief but reliable follow-up window"],["Gravitic Flux","lifts an entire area of enemies and slams them for potentially lethal damage"]],st:"Gravitic Flux lifts and slams the entire enemy team simultaneously, dealing potentially lethal damage to everyone with no individual escape possible. Kinetic Grasp uniquely absorbs some projectile ultimates into personal overhealth, giving him a second defensive tool alongside D.Va's Defense Matrix.",wk:"His Hyperspheres are slow and require arc prediction, making mobile targets difficult to hit consistently. Sombra's Hack disables both Kinetic Grasp and Experimental Barrier simultaneously, removing his entire defensive kit in a single cast."},
  "winston":{ab:[["Tesla Cannon","auto-locks onto nearby targets without requiring precise aim, letting him focus entirely on positioning"],["Tesla Cannon (charged)","long-range single-target bolt that threatens targets before he commits to a dive"],["Jump Pack","reaches any backline target in under a second from nearly anywhere on the map"],["Barrier Projector","dome shield that protects him and allies mid-dive, enabling the team to push up safely inside it"],["Primal Rage","massively increases his health and melee damage, turning a losing fight into a reset"]],st:"Jump Pack makes him the fastest engage tool in the game — he can be on any support or sniper before they can react, and Tesla Cannon's auto-lock means he can focus entirely on positioning rather than tracking. Barrier Projector during a dive creates a dome that protects him and lets allies push up safely inside.",wk:"Zarya directly counters his dive — she bubbles the targets he lands on and her beam destroys him at his own engagement range. He has almost no answer to coordinated peel; if the enemy team collapses on him as a unit after his Jump Pack, he rarely survives."},
  "wrecking-ball":{ab:[["Quad Cannons","high sustained DPS in Walker mode that rewards stationary hold positions"],["Grappling Claw","swings at high speed with knockback on impact that scales with velocity, disrupting enemy formations on every pass"],["Adaptive Shield","generates more temporary health the more enemies are nearby, rewarding diving into the middle of a group"],["Piledriver","launches nearby enemies airborne from above, creating a follow-up window mid-swing"],["Minefield","zones an entire objective or chokepoint, forcing enemies to clear it before advancing"]],st:"Grappling Claw momentum-scaled knockback disrupts enemy formations on every pass, and Piledriver launches targets airborne from above — few heroes can maintain coherent positioning against him. Minefield forces the enemy to commit resources to clearing the objective before they can advance.",wk:"Sombra's Hack is a near-complete shutdown — it roots him in place and disables every ability, turning his entire mobility kit off at once. He generates very little damage unless he slows down, and slowing down is exactly when he's easiest to kill."},
  "zarya":{ab:[["Particle Cannon (beam)","damage scales directly with energy — at full charge, the highest DPS of any tank weapon"],["Particle Cannon (burst)","AoE energy grenade that also scales with energy, punishing grouped targets"],["Particle Barrier","personal bubble that converts incoming damage into energy charge"],["Projected Barrier","applies the same bubble to an ally, protecting them while simultaneously charging her damage"],["Graviton Surge","pulls every nearby enemy to a single point, setting up instant wipes with allied DPS ultimates"]],st:"Graviton Surge pulls the entire enemy team to a single point, enabling immediate wipes from Dragonblade, Death Blossom, or any AoE ultimate. Projected Barrier saves allies from burst combos while simultaneously charging her to full damage output.",wk:"Her damage is entirely energy-dependent — without consistently absorbing damage through bubbles she is one of the weaker tanks offensively. Enemies who spread and play at range deny her bubbles, keeping her at low charge and low threat for the entire fight."},
  "anran":{ab:[["Zhuque Fans","dual projectiles that apply Ignition on hit, building burn stacks for Fan the Flames amplification"],["Fan the Flames","amplifies all active burn effects simultaneously, creating burst spikes on any ignited target"],["Inferno Rush","forward propulsion that damages everything in the path and resets engagement range"],["Dancing Blaze","brief invulnerability that phases through incoming damage while dealing and healing"],["Vermillion Ascent / Revival","charge-forward ultimate that also auto-revives her if she dies with full charge — forcing enemies to track her ultimate at all times"]],st:"Vermillion Revival forces the enemy team to track her ultimate charge at all times, fundamentally changing how they allocate kill priority. Fan the Flames creates massive damage spikes on any burning target, rewarding coordinated fire with supports or AoE allies.",wk:"Kiriko's Suzu cleanses all burn effects instantly, completely shutting down her passive synergy and removing the damage amplification she depends on. Once Dancing Blaze is spent she has no remaining defensive option, leaving her exposed to burst."},
  "ashe":{ab:[["The Viper","flexible rifle that rewards hip-fire at close range and precision scoped shots at distance"],["Coach Gun","knocks enemies away while launching Ashe backward, enabling repositioning or denying dives"],["Dynamite","area burn that forces enemies to move or take sustained damage, combining well with scoped follow-up"],["B.O.B.","a sixth player with his own health pool who independently applies crowd control and sustained fire"]],st:"B.O.B. has his own health pool, applies crowd control independently, and fires continuously without any further input — invaluable for stalling objectives and forcing enemies to divide attention. Coach Gun's knockback makes her remarkably self-sufficient, denying most dives without support.",wk:"Sombra Hacks B.O.B., turning him completely useless for the duration — the single most damaging individual interaction against her kit. Fast flankers like Genji and Tracer reach her before she can scope, where her hip-fire is among the weakest on the roster."},
  "bastion":{ab:[["ST-87 Rifle","mobile automatic fire in Recon mode for navigating between positions"],["Config: Assault","the highest raw DPS of any hero ability — devastating at close range from a stationary position"],["A-36 Tactical Grenade","bounces off surfaces and sticks to enemies, providing burst damage while repositioning"],["Config: Artillery","three mortar shells fired at chosen locations anywhere on the map with no line-of-sight requirement"]],st:"Assault mode has no equal for raw point DPS — he can delete a tank in seconds from behind cover. Artillery ultimate fires at chosen map locations from complete safety, making him uniquely able to bomb chokepoints and objectives without exposure.",wk:"He is entirely stationary in Assault mode, making his position predictable and flanks immediately lethal. D.Va's Defense Matrix completely negates his primary damage output with no counterplay from him."},
  "cassidy":{ab:[["Peacekeeper","reliable revolver with high headshot potential that rewards precision at any range"],["Fan the Hammer","empties all six rounds rapidly at close range for burst damage when precision is less important"],["Combat Roll","reloads mid-animation in the direction of movement, removing the vulnerability window of a normal reload"],["Magnetic Grenade","auto-tracks the nearest enemy and sticks to them — cannot be escaped by most mobility abilities"],["Deadeye","locks onto all enemies in line of sight, rewarding stationary targets with increasing lethal damage"]],st:"Flashbang is one of the most reliable anti-flanker tools in the game — the hindered status prevents movement abilities from activating, catching Tracer and Genji mid-dash. Combat Roll's instant reload removes the normal vulnerability window between shots, giving him exceptional sustained pressure.",wk:"Reinhardt's barrier absorbs his entire magazine with no counterplay. Genji's Deflect sends every shot back at him, and Pharah operates at an altitude where landing consistent headshots is very difficult."},
  "echo":{ab:[["Tri-Shot","fires three projectiles in a triangle pattern for high total damage that rewards aim"],["Glide","maintains aerial position during descent, enabling extended time at elevated angles"],["Focusing Beam","dramatically increased damage against any target below 50% health, creating execution windows"],["Sticky Bombs","burst of delayed explosives that attach to surfaces or enemies and punish grouped positioning"],["Flight","brief free-form aerial movement in any direction, enabling unique angles other DPS cannot access"],["Duplicate","copies an enemy hero and charges their ultimate dramatically faster, gifting an early extra ultimate"]],st:"Duplicate gives her unprecedented flexibility — she can copy any hero and fire their ultimate almost immediately, effectively gifting her team an early extra ultimate. Focusing Beam turns her into an execution tool on any target below half health, and the Recon passive reveals those targets through walls.",wk:"Hitscan heroes track her predictable aerial movement easily and she has no defensive ability to break line of sight. Sombra's Hack grounds her by disabling Flight and cancels Duplicate mid-cast."},
  "emre":{ab:[["Synthetic Burst Rifle","accurate three-round burst that rewards controlled fire at range"],["Take Aim","zooms in to extend falloff range and tighten accuracy for longer engagements"],["Siphon Blaster","life-stealing explosive pistol with increased mobility, sustaining him through exchanges that would force other DPS to disengage"],["Cyber Frag","bounces off surfaces before detonating, enabling indirect fire around corners"],["Override Protocol","launches him airborne with a cannon — light rapid fire or a single charged devastation shot"]],st:"Siphon Blaster sustains him through extended fights well beyond what his rifle alone allows — he can win duels other DPS heroes would need to disengage from. Cyber Frag's wall-bounce enables indirect fire around corners, punishing entrenched targets without requiring line of sight.",wk:"Both his primary and Siphon Blaster lose effectiveness at the extreme ranges where Ashe and Widowmaker are most comfortable. Once Siphon Blaster is spent he has no mobility ability, making him vulnerable to dives during its cooldown."},
  "freja":{ab:[["Revdraw Crossbow","rapid automatic bolts that reward sustained fire over precision"],["Take Aim","high-speed explosive bolt on a precision shot, refreshed by every Quick Dash"],["Quick Dash","vaults in the movement direction while simultaneously refreshing Take Aim"],["Updraft","launches upward for significant vertical height, enabling sightlines other DPS cannot use"],["Bola Shot","ensnares the first target and draws all nearby enemies into a guaranteed cluster for detonation"]],st:"Bola Shot clusters multiple enemies for instant follow-up, pairing with any AoE ultimate for a near-guaranteed wipe. Quick Dash simultaneously repositions her and refreshes Take Aim, giving her an unusually high rate of high-velocity explosive shots.",wk:"Her automatic crossbow bolts have low per-shot damage, making her heavily dependent on Take Aim hits to finish targets. Losing both Quick Dash and Updraft to cooldown simultaneously leaves her with no answer to a dive."},
  "genji":{ab:[["Shuriken (volley)","fan spread that punishes groups at close-to-medium range"],["Shuriken (fan)","precise sequential throw for single-target damage at longer range"],["Swift Strike","dashes through enemies in a line and resets on every elimination"],["Deflect","spins his blade to send all incoming projectiles back at their source, including most ultimates"],["Dragonblade","legendary sword for eight seconds with Swift Strike resetting on every kill, enabling chain eliminations"]],st:"Swift Strike's kill-reset means a single elimination during Dragonblade allows indefinite chaining — he can clear an entire team in eight seconds with the right setup. Deflect provides unique utility for the whole team, sending ultimates like Dragonstrike and Whole Hog back at the enemy.",wk:"Beam weapons bypass Deflect entirely, making Zarya, Symmetra, and Moira reliable counters regardless of his skill. Brigitte is his dedicated counter — her armor absorbs chip damage, Shield Bash interrupts Dragonblade, and her healing passively sustains nearby allies through his burst."},
  "hanzo":{ab:[["Storm Bow","fully charged arrow that one-shots most non-tank heroes on a headshot"],["Sonic Arrow","reveals all enemies within its radius through walls, providing team-wide information"],["Storm Arrows","rapid-fire burst mode that removes the charge requirement for a window of quick shots"],["Lunge","mid-air directional double jump that repositions him unpredictably"],["Dragonstrike","spirit dragon that travels through all terrain, flushing enemies from any enclosed position"]],st:"Sonic Arrow provides team-wide wallhack-equivalent vision for its full duration — invaluable for coordinating pushes or knowing when to retreat. Dragonstrike forces enemies out of any chokepoint or building; the threat alone reshapes how the enemy positions even before it fires.",wk:"His arrows have travel time and require charge, making highly mobile targets like Tracer and Lucio very difficult to hit consistently. D.Va's Defense Matrix swallows both his arrows and his ultimate without any counterplay."},
  "junkrat":{ab:[["Frag Launcher","lobbing grenades that bounce off walls and punish any enclosed space or grouped positioning"],["Concussion Mine","launches Junkrat or enemies airborne on detonation, used for mobility or burst damage"],["Steel Trap","immobilises the first enemy to walk through it, punishing flankers who target him directly"],["RIP-Tire","remotely controlled explosive tire steered directly into positions the player would never normally reach"]],st:"In enclosed chokepoints his grenades are nearly impossible to avoid — the arc punishes any attempt to peek or hold tight cover. RIP-Tire can reach positions the player could never normally access, flushing entire fortified compositions with the threat alone forcing movement.",wk:"D.Va's Defense Matrix absorbs every single grenade, completely negating his output with no counterplay available. Pharah floats above his parabolic trajectory entirely and attacks from an angle he cannot reach."},
  "mei":{ab:[["Endothermic Blaster","slows then freezes enemies who stay in the beam long enough, enabling guaranteed follow-up"],["Icicle","precise high-damage projectile for punishing specific targets at longer range"],["Cryo-Freeze","full invulnerability window that waits out enemy cooldowns and heals inside"],["Ice Wall","instant terrain creation that splits a team, blocks retreat, or creates cover on demand"],["Blizzard","slows then freezes all enemies in a large area, pairing with almost any AoE ultimate for a guaranteed wipe"]],st:"Ice Wall can split an enemy team in half at a critical moment with no warning, permanently separating supports from tanks. Cryo-Freeze waits out enemy cooldowns from inside the ice — she simply outlasts the burst window that would kill any other hero.",wk:"Sombra's Hack disables Ice Wall and Cryo-Freeze simultaneously — her hardest counter with almost no counterplay. Pharah and Echo stay airborne and entirely out of her beam range."},
