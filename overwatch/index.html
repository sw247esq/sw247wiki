  "pharah":{ab:[["Rocket Launcher","splash damage punishes grouping and removes the need for precise aim"],["Jump Jet","instant vertical repositioning that resets sightlines and escapes ground threats"],["Concussive Blast","displaces enemies while simultaneously launching Pharah to a new angle"],["Barrage","forces the entire enemy team to break cover and scatter, even when it doesn't land cleanly"]],st:"Pharah operates where most heroes can't follow — teams without reliable hitscan are functionally useless against her at altitude. Rocket Launcher's splash has no damage falloff at any range, so she applies consistent pressure from distances that make her nearly impossible to punish in return.",wk:"Any hero with reliable hitscan — Soldier: 76, Cassidy, Ashe, Sierra — immediately flips the matchup. Barrage locks her completely in place; without hard cover or a teammate creating a distraction, she is a stationary target for the full duration. Sombra's Hack mid-air disables all three flight abilities simultaneously."},
  "reaper":{ab:[["Hellfire Shotguns","dual automatic shotguns with devastating point-blank damage — the best tank-killing weapon in the game"],["Wraith Form","brief invulnerability that drops all debuffs and passes through enemies"],["Shadow Step","teleports to any targeted location, accessing flanking angles no other close-range hero can reach"],["Dire Triggers","precise long-range shotgun blast that rewards accuracy beyond his normal effective range"],["Death Blossom","spins and fires in all directions simultaneously for massive AoE damage"]],st:"The Reaping passive heals him faster than most heroes can damage him at melee range, making uncoordinated close-range fights almost impossible for the enemy to win. Death Blossom paired with Graviton Surge is one of the most reliable full-team wipe combinations in the game.",wk:"Any hero that maintains distance denies his entire kit — he has almost no threat beyond shotgun range. Sombra's Hack disables Wraith Form and Shadow Step simultaneously, removing both his escape and his engage tool in a single cast."},
  "sierra":{ab:[["Helix Rifle","automatic spiral-pattern weapon that gains accuracy with sustained fire"],["Tracking Shot","marks a target so Helix Rifle auto-tracks them briefly, bridging the gap between sniper and sustained fire"],["Anchor Drone","launches to any surface and grapples her toward it, enabling mobility rivalling dedicated flankers"],["Tremor Charge","AoE shockwave on impact that punishes grouped positioning"],["Trailblazer","deploys the Anchor Drone to fly forward and drop a line of explosive charges across a path"]],st:"Anchor Drone gives her map traversal rivalling dedicated flankers, reaching any surface on any map in seconds. The Recon passive reveals low-health targets through walls, making her invaluable for tracking wounded enemies and coordinating follow-up.",wk:"Sombra's Hack grounds her entirely by disabling Anchor Drone — removing both her primary mobility and her primary engagement tool at once. She is weakest while stationary, and Tracking Shot requires a brief window to activate."},
  "sojourn":{ab:[["Railgun (auto)","standard automatic fire that generates railgun energy on every hit"],["Railgun (charged)","releases accumulated energy as a one-shot burst against most non-tanks at full charge"],["Power Slide","long sliding dash that can launch into a high jump, enabling aggressive repositioning"],["Disruptor Shot","slowing energy field that traps enemies and simultaneously charges her railgun"],["Overclock","grants infinite railgun charge for several seconds, enabling multiple consecutive one-shot bursts"]],st:"Her Charged Shot can eliminate most heroes from full health in a single hit at any range, making every engagement a kill threat the enemy must respect. Overclock removes the energy constraint for several seconds, enabling a sustained barrage of lethal charged shots.",wk:"D.Va's Defense Matrix absorbs charged shots with no counterplay. Flankers who close inside her accuracy window make the auto-fire component much harder to leverage, and Power Slide's cooldown is long enough that she can be caught mid-repositioning."},
  "soldier-76":{ab:[["Heavy Pulse Rifle","consistent automatic fire with no special mechanics — reliable at any range"],["Sprint","dramatically increased movement speed with the ability to reload mid-sprint"],["Biotic Field","passive healing station for himself and nearby allies, winning extended fights through sustained recovery"],["Helix Rockets","AoE burst on cooldown that spikes damage above what the rifle alone can achieve"],["Tactical Visor","auto-aims at all enemies in line of sight for its duration, removing the aim requirement entirely"]],st:"Biotic Field means he wins wars of attrition against heroes that must disengage to heal. Tactical Visor's auto-aim even tracks Dragonblade Genji between kills — it's one of the few abilities that punishes evasive movement-based ultimates directly.",wk:"Genji's Deflect sends Helix Rockets back for instant burst damage — one of the cleanest individual counters in the game. He has no mobility ability, making him predictable to dive and straightforward to flank on open maps."},
  "sombra":{ab:[["Machine Pistol","automatic close-range weapon — secondary to her hack in almost every engagement"],["Hack","disables all abilities on a single target for several seconds, neutering any hero's kit"],["Translocator","instant teleport to a previously thrown beacon from anywhere on the map"],["Stealth","invisibility while moving with a reduced speed penalty when revealed"],["EMP","simultaneously hacks all enemies in a large radius, destroying all shields and barriers instantly"]],st:"Hack is the most impactful single targeted ability in the game — it removes every ability from a hero for several seconds, neutering tanks, supports, and DPS alike. EMP resets an entire teamfight at once, and Opportunist gives her through-wall vision of hacked targets and anyone below half health.",wk:"Her machine pistol damage is low — if she cannot hack, she contributes very little to a fight. EMP requires getting into the middle of the enemy team while visible, which experienced opponents punish immediately with focused burst."},
  "symmetra":{ab:[["Photon Projector (beam)","auto-locking beam that scales to three times base damage over time and ignores all barriers"],["Photon Projector (orb)","slow-moving energy ball that passes through barriers and explodes on contact"],["Sentry Turret","self-tracking turrets that slow enemies and act as motion sensors for incoming flanks"],["Teleporter","creates instant team-wide repositioning to any location within range"],["Photon Barrier","a massive moving barrier that crosses the entire map, blocking all incoming fire along its path"]],st:"At full charge her beam deals more DPS than most heroes while requiring zero aim — she only needs to maintain contact. Teleporter is the only ability in the game enabling team-wide instant repositioning, creating surprise angles on demand.",wk:"D.Va's Defense Matrix blocks her orbs entirely while Boosters break beam contact. Genji's Deflect returns beam damage and Swift Strike destroys her turret clusters before she can establish coverage."},
  "torbjorn":{ab:[["Rivet Gun (auto)","close-range burst fire that rewards tight positioning"],["Rivet Gun (slug)","single high-damage shot for punishing specific exposed targets at range"],["Forge Hammer","repairs the turret rapidly, maintaining its uptime through focused enemy fire"],["Deploy Turret","autonomous tracking turret that independently damages and slows enemies"],["Molten Core","lays pools of molten slag that physically block corridors and punish groups for their duration"]],st:"A well-placed turret in a chokepoint provides persistent damage that forces the enemy to commit resources to clearing it before they can push. Molten Core can physically block entire corridors — enemies must take significant damage to advance through it.",wk:"Junkrat's grenade arc destroys the turret from angles it cannot track. His kit is entirely positional — a team that flanks around the turret's coverage area forces him to abandon his primary source of value with no way to immediately reestablish it."},
  "tracer":{ab:[["Pulse Pistols","dual automatics with very short effective range but extreme DPS in close quarters"],["Blink","teleports a short distance in the movement direction with up to three charges"],["Recall","rewinds position, health, and ammo to three seconds ago, dropping all debuffs"],["Pulse Bomb","sticky explosive that adheres to enemies or surfaces and detonates for massive burst damage"]],st:"Recall is one of the most powerful panic buttons in the game — it negates any burst combo, drops all debuffs, and resets her position to three seconds prior. Her extreme baseline movement speed means she's threatening even with all three Blink charges depleted.",wk:"Brigitte is her dedicated counter — armor absorbs burst, Shield Bash disrupts Recall timing, and Rally health negates her damage windows entirely. Her Pulse Pistols have almost no threat beyond point-blank range, so any hero that forces distance wins."},
  "vendetta":{ab:[["Overhead Strike","heavy swing that bypasses tank damage reduction entirely — the only ability in the game that does so"],["Slash","rapid horizontal strike with a faster cooldown, part of the three-hit combo sequence"],["Whirlwind Dash","spins forward through enemies, damaging all hit along the path"],["Soaring Slice","throws the blade and flies to its location, closing gaps or reaching aerial angles"],["Warding Stance","absorbs all frontal projectile and melee damage, completely nullifying enemy melee attacks"],["Sundering Blade","pierces barriers, damage reduction, and shields — hitting through almost every defensive ability in the game"]],st:"Overhead Strike bypasses damage reduction — the only ability in the game that does so — making her uniquely threatening to heavily fortified tanks. Warding Stance nullifies enemy melee attacks completely, turning Reinhardt's hammer and Doomfist's combos into non-threats.",wk:"Pharah and Echo stay airborne and entirely outside her melee range. Sombra's Hack disables Warding Stance and Soaring Slice simultaneously, stripping both her defense and her gap-closer in one cast."},
  "venture":{ab:[["Smart Excavator","seismic projectile that bursts after a short distance for AoE damage"],["Drill Dash","forward spring that damages and knocks back enemies in the path"],["Burrow","full invulnerability underground before emerging to knock enemies upward"],["Clobber","enhanced melee that deals significantly more damage than a standard quick melee"],["Tectonic Shock","wide ground shockwave that covers enormous area and pairs with any setup ultimate"]],st:"Burrow provides invulnerability usable both offensively and defensively — emerging in the middle of an enemy team is genuinely disorienting and difficult to react to. Explorer's Resolve shield generation from abilities makes them surprisingly durable in sustained exchanges.",wk:"Their entire kit is close-range dependent — heroes that maintain distance and poke deny them any meaningful engagement. Symmetra's beam auto-locks onto them as they emerge from Burrow, punishing the predictable exit location with full-charge damage."},
  "widowmaker":{ab:[["Widow's Kiss (scoped)","fully charged headshot instantly eliminates most non-tank heroes"],["Widow's Kiss (auto)","automatic carbine for close-range situations where scoping is impractical"],["Grappling Hook","repositions her to any surface within range, enabling constant sightline changes"],["Venom Mine","proximity explosive that poisons and reveals triggering enemies through walls"],["Infra-Sight","reveals all enemies through walls for the entire team for a substantial duration"]],st:"A skilled Widowmaker creates permanent map control — enemies must constantly move or die, disrupting any composition that relies on holding angles. Infra-Sight gives her entire team wallhack information for a substantial duration, enabling coordinated attacks through walls.",wk:"Her carbine is extremely weak up close — any flanker who reaches her wins the duel without much contest. Genji's Deflect sends scoped shots back for a potential instant kill, completely reversing the matchup."},
  "ana":{ab:[["Biotic Rifle","precision rifle that heals allies and simultaneously damages and anti-heals enemies on direct hit"],["Sleep Dart","puts the first enemy hit into a sleep state for several seconds, stopping any channeled ultimate mid-cast"],["Biotic Grenade","heals allies and applies anti-heal to all enemies hit — the most impactful non-ultimate ability in the game"],["Nano Boost","supercharges an ally's damage and damage reduction, functioning as a teamfight trigger for the whole team"]],st:"Biotic Grenade is the single most impactful non-ultimate ability in the game — anti-heal strips self-sustaining tanks and makes them trivially easy to kill for several seconds. Sleep Dart can stop Dragonblade, Whole Hog, and Barrage mid-animation with a single well-placed dart.",wk:"Limited mobility makes her vulnerable to any fast-moving dive hero — she has no escape ability beyond repositioning on foot. Missed Biotic Grenades and Sleep Darts at critical moments are completely wasted with no secondary effect."},
  "baptiste":{ab:[["Biotic Launcher (burst)","three-round burst with competitive damage output for a support hero"],["Biotic Launcher (heal)","projectile healing that requires aim toward allies — not a passive or beam"],["Immortality Field","prevents allies from dying while the device lives, changing the calculus of any burst combo"],["Regenerative Burst","AoE heal over time for himself and nearby allies"],["Amplification Matrix","doubles the damage and healing of all projectiles passing through it for its duration"],["Exo Boots","crouch-then-jump propulsion that reaches elevated positions other supports cannot access"]],st:"Immortality Field changes the fundamental calculus of any teamfight — it makes burst-wipe compositions non-functional against it. Amplification Matrix effectively doubles the output of everyone firing through it, making it one of the most fight-skewing non-healing ultimates in the game.",wk:"Sombra's Hack disables Immortality Field entirely with no counterplay. His healing requires aim and has projectile travel time, making him the most mechanically demanding support to extract full value from under pressure."},
  "brigitte":{ab:[["Rocket Flail","extended-reach melee that activates Inspire passive healing for all nearby allies"],["Barrier Shield","frontal barrier that absorbs incoming damage while held"],["Shield Bash","dashes forward to stun an enemy on contact while Barrier Shield is raised"],["Whip Shot","throws the flail forward to deal damage and knock a target back significantly"],["Repair Pack","targeted healing throw that overheals as armor if the ally is already at full health"],["Rally","builds armor on all nearby allies over time while increasing her movement speed"]],st:"Inspire provides passive AoE healing to frontline allies without requiring aim, making her invaluable in sustained brawl compositions. Shield Bash interrupts Genji's Dragonblade and Tracer's Recall timing — she is purpose-built to shut down the flankers those heroes represent.",wk:"Pharah and Echo stay entirely outside her melee range where she has no effective threat. Sombra's Hack strips all her abilities simultaneously and prevents Inspire from activating, removing her entire identity in a single cast."},
  "illari":{ab:[["Solar Rifle (auto)","automatic rifle with strong sustained damage output for a support hero"],["Solar Rifle (charged)","precision healing shot that restores health on direct hit with an ally"],["Outburst","propels her in any direction while pushing nearby enemies away"],["Healing Pylon","passive heal-over-time device for any ally within range — operates without her attention"],["Captive Sun","marks slowed enemies to explode when they take any additional damage"]],st:"Healing Pylon operates independently, freeing her to play aggressively with her rifle without sacrificing healing output. Captive Sun's marked detonation creates a follow-up kill window — any damage from teammates instantly triggers the explosion.",wk:"Flankers can destroy Healing Pylon before she can respond, removing her passive healing entirely. Outburst is her only escape tool and it has a significant cooldown, leaving her exposed if caught on the wrong side of it."},
  "jetpack-cat":{ab:[["Claw Blasters","automatic ranged weapon with competitive damage output while airborne"],["Lifeline","tethers an ally and tows them through the air while healing them, enabling dramatic mid-fight repositioning"],["Scratch Attack","forward slashing dash that deals damage and briefly reveals enemy positions"],["Aerial Barrage","concentrated aerial bombardment across a large area directly below"]],st:"Permanent flight makes her immune to sweepers, slows, hooks, and melee heroes entirely. Lifeline can save an ally from a hook, a Death Blossom, or any ground-level threat in a single reactive moment — relocating them anywhere within range.",wk:"Hitscan heroes track her predictable aerial position very easily and she has limited ability to dodge while towing an ally. She has almost no ground-level presence, making her entirely dependent on maintaining altitude to function."},
  "juno":{ab:[["Mediblaster","automatic weapon that heals allies and damages enemies on the same direct hit"],["Glide Boost","forward rocket boost that activates passive regeneration"],["Pulsar Torpedoes","homing projectiles that split between allies to heal and enemies to damage simultaneously"],["Hyper Ring","tossed ring that grants any ally passing through it a movement speed boost"],["Orbital Ray","orbital beam that heals allies and boosts their damage output for its duration"]],st:"Hyper Ring's speed boost enables dive compositions to close the gap or rush objectives faster than the enemy can react. Pulsar Torpedoes home in on allies she cannot maintain line of sight to — one of the only homing healing abilities in the game.",wk:"She has no self-defense tools when flanked, relying entirely on Glide Boost and double-jump to escape. Her kit rewards constant movement, which means she generates less value on maps with few open corridors for Hyper Ring placement."},
  "kiriko":{ab:[["Healing Ofuda","thrown healing talismans that track toward allies — requires directional aim"],["Kunai","three-kunai fan throw with high headshot damage for a support hero"],["Swift Step","teleports directly to any targeted ally through terrain, walls, or floors"],["Protection Suzu","cleanses virtually any debuff from nearby allies — anti-heal, sleep, freeze, hack, and many ultimate effects"],["Kitsune Rush","summons a spirit that grants nearby allies dramatically increased movement speed, attack speed, and reduced cooldowns"]],st:"Suzu cleanses virtually every debuff in the game — anti-heal, freeze, sleep, hack, and even some in-flight ultimates — making it one of the most versatile defensive tools on the roster. Swift Step through any terrain makes her almost impossible to trap and gives her unmatched escape and peel range.",wk:"Her healing requires directional aim at moving allies, making output dependent on her own positioning discipline. High-burst DPS can eliminate allies faster than she can Suzu them, particularly if she is caught out of position when the damage lands."},
  "lifeweaver":{ab:[["Thorn Volley","automatic burst of thorns for reasonable damage output"],["Healing Blossom","charged-and-released healing shot that restores health on a direct hit with an ally"],["Petal Platform","ascending platform that creates instant high ground access on any map"],["Life Grip","physically relocates an allied hero to Lifeweaver's position, escaping any kill combo"],["Tree of Life","large healing tree with significant health that sustains the team through prolonged pushes"]],st:"Life Grip is the only ability in the game that physically relocates an allied hero — saving teammates from hooks, Death Blossoms, and Dragonblades that would otherwise be unavoidable. Petal Platform creates instant high-ground access anywhere on any map without needing ramps or stairs.",wk:"His raw healing output is lower than most supports, making him a liability in compositions that need high sustained throughput. Sombra's Hack nullifies Life Grip and Petal Platform simultaneously — his two highest-impact abilities — with no counterplay."},
  "lucio":{ab:[["Sonic Amplifier","burst of sound energy projectiles for reasonable sustained damage"],["Soundwave","knocks nearby enemies back, pushing them off high ground or away from allies"],["Crossfade","toggles between passive AoE healing and passive AoE speed boost for all nearby allies — no aim required"],["Amp It Up","greatly amplifies the active Crossfade song's effect for a short burst"],["Sound Barrier","instantly provides all nearby allies with a large temporary shield that decays over time"]],st:"Crossfade requires no aim and passively benefits every nearby ally at all times — Speed Song enables dive compositions to close distance faster than enemies can react. Sound Barrier's instantaneous team-wide shielding counters Earthshatter, Blizzard, and Death Blossom before they deal meaningful damage.",wk:"His healing output is among the lowest of any support — compositions that take heavy burst damage can outpace Crossfade entirely. Wall Ride mobility is route-dependent; on open maps with fewer walls, his escape options are significantly reduced."},
  "mercy":{ab:[["Caduceus Staff (heal)","continuous tether heal at the highest per-second rate in the game"],["Caduceus Staff (boost)","amplifies an ally's damage output by 30%, multiplicatively increasing the threat of any beam or burst hero"],["Guardian Angel","dashes rapidly toward a targeted ally, providing constant repositioning between allies"],["Resurrect","revives a recently-dead ally at full health, reversing a fight-losing death"],["Flash Heal","instant-cast burst heal usable on herself or a nearby ally"],["Valkyrie","enables free flight, multi-target tethering, and channelless Resurrect for its duration"]],st:"30% Damage Boost multiplied by a consistent beam hero creates output exceeding what either hero could produce alone — Pharmercy is a self-sustaining aerial threat built entirely around this synergy. Resurrect reverses a fight-losing death at any moment, potentially swinging the outcome of a round.",wk:"Sombra's Hack disables Resurrect and Guardian Angel simultaneously, stranding her without escape or revival tools. She is entirely dependent on staying attached to a primary target — heroes that dive her during Guardian Angel animations catch her completely vulnerable."},
  "mizuki":{ab:[["Spirit Glaive","spinning blade that bounces off walls and hits enemies around corners"],["Healing Kasa","hat throw that bounces to nearby allies and heals Mizuki on return"],["Binding Chain","tethering chain that hinders the first enemy hit, grounding aerial heroes"],["Katashiro Return","leap forward leaving a paper doll, then return to its location with increased speed"],["Kekkai Sanctuary","zone that heals allies and absorbs all incoming enemy projectiles from outside the area"]],st:"Binding Chain is uniquely powerful against mobile heroes — it grounds aerial targets like Pharah and Jetpack Cat and hinders flankers like Tracer and Genji, neutralising the mobility that defines those heroes. Kekkai Sanctuary absorbs entire projectile ultimates including Dragonstrike and RIP-Tire.",wk:"Remedy Aura requires proximity to allies to be effective, making him vulnerable to the same dives that threaten his team. Sombra's Hack removes Binding Chain and Katashiro Return simultaneously, stripping his crowd control and his escape at once."},
  "moira":{ab:[["Biotic Grasp (heal)","short-range beam that heals nearby allies using stored life force"],["Biotic Grasp (damage)","drains life force directly from an enemy while simultaneously healing Moira"],["Fade","brief invisibility and invulnerability that teleports her a short distance"],["Biotic Orb","bouncing orb that heals allies or damages enemies independently without line-of-sight requirement"],["Coalescence","long-range beam that heals allies and damages enemies simultaneously, passing through all barriers"]],st:"Biotic Orbs bounce around terrain and through cover without requiring line of sight, operating independently while she focuses elsewhere. Coalescence cannot be blocked by Reinhardt's shield, Sigma's barrier, or any other cover — it passes through all of them.",wk:"Sombra's Hack removes Fade entirely — her only escape from any engagement. Her healing beam has a very short range, requiring her to stay dangerously close to the frontline to deliver full healing output."},

// Country code to emoji flag
function flagEmoji(fl){
  if(!fl) return '';
  // handle sub-tags like gb-sct
  const base=fl.split('-')[0].toUpperCase();
  return base.split('').map(c=>String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)).join('');
}

function buildHpBar(sl){
  const d=HERO_HP[sl];
  if(!d) return '';
  const total=d.hp+d.armor+d.shield;
  const pHP=Math.round(d.hp/total*100);
  const pAR=Math.round(d.armor/total*100);
  const pSH=Math.round(d.shield/total*100);
  const legend=[];
  if(d.hp) legend.push(`<span class="hp-legend-item"><span class="hp-dot" style="background:#e05070"></span><span style="color:#c04060">${d.hp} Health</span></span>`);
  if(d.armor) legend.push(`<span class="hp-legend-item"><span class="hp-dot" style="background:#f5a623"></span><span style="color:#c8902a">${d.armor} Armor</span></span>`);
  if(d.shield) legend.push(`<span class="hp-legend-item"><span class="hp-dot" style="background:#5bc8f0"></span><span style="color:#4aaccc">${d.shield} Shields</span></span>`);
  return`<div class="hp-bar-wrap">
  <div class="hp-bar">
    ${d.hp?`<div class="hp-seg-health" style="width:${pHP}%"></div>`:''}
    ${d.armor?`<div class="hp-seg-armor" style="width:${pAR}%"></div>`:''}
    ${d.shield?`<div class="hp-seg-shield" style="width:${pSH}%"></div>`:''}
  </div>
  <span class="hp-total">${total}</span>
</div>
<div class="hp-legend">${legend.join('')}</div>`;
}

function buildStatChips(st){
  if(!st) return '';
  const chips=[];
  if(st.dmg) chips.push(`<span class="ability-stat as-dmg">⚔ ${st.dmg}</span>`);
  if(st.heal) chips.push(`<span class="ability-stat as-heal">✚ ${st.heal}</span>`);
  if(st.cd) chips.push(`<span class="ability-stat as-cd">⏱ ${st.cd}</span>`);
  return chips.length?`<div class="ability-stats">${chips.join('')}</div>`:'';
}

// Populate enemy dropdown grouped by role
function initCounterDropdown(){
  const sel = document.getElementById('ct-enemy');
  const groups = {tank:'Tanks', dps:'Damage', sup:'Support'};
  for(const [role, label] of Object.entries(groups)){
    const og = document.createElement('optgroup');
    og.label = label;
    ALL_HEROES.filter(h=>h.r===role).sort((a,b)=>a.n.localeCompare(b.n)).forEach(h=>{
      const opt = document.createElement('option');
      opt.value = h.sl;
      opt.textContent = h.n;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  }
}
initCounterDropdown();

// Extract primary counter name + reason from ct text
function parseCounter(ctText){
  if(!ctText) return null;
  // First hero name mentioned (usually before first comma or period or 's or 'and')
  const heroNames = ALL_HEROES.map(h=>h.n);
  // Find first hero name that appears in the text
  let first = null, firstIdx = Infinity;
  for(const name of heroNames){
    const idx = ctText.indexOf(name);
    if(idx !== -1 && idx < firstIdx){
      firstIdx = idx;
      first = name;
    }
  }
  if(!first) return null;
  // Extract the sentence containing this hero
  const sentences = ctText.split(/(?<=[.!?])\s+/);
  const primary = sentences.find(s=>s.includes(first)) || sentences[0];
  return {name: first, why: primary.trim()};
}

function updateCounter(){
  const enemySlug = document.getElementById('ct-enemy').value;
  const myRole = document.getElementById('ct-role').value;
  const resultEl = document.getElementById('ct-result');

  if(!enemySlug || !myRole){
    resultEl.classList.remove('visible');
    resultEl.innerHTML = '';
    return;
  }

  const enemy = ALL_HEROES.find(h=>h.sl===enemySlug);
  if(!enemy){ resultEl.innerHTML=''; return; }

  const ctText = enemy.ct[myRole];
  const parsed = parseCounter(ctText);

  if(!parsed){
    resultEl.classList.add('visible');
    resultEl.innerHTML = '<div class="counter-none">No specific counter data available for this combination.</div>';
    return;
  }

  const counterHero = ALL_HEROES.find(h=>h.n===parsed.name);
  const roleClass = counterHero ? counterHero.r : 'dps';
  const roleLabelMap = {tank:'Tank', dps:'Damage', sup:'Support'};
  const roleLabel = roleLabelMap[roleClass] || '';
  const img = counterHero ? heroImg(counterHero.sl) : '';
  const initials = parsed.name.substring(0,2).toUpperCase();
  const fbClass = `fb-${roleClass}`;

  // Full counter text for "also consider"
  const alsoText = ctText;

  resultEl.classList.add('visible');
  resultEl.innerHTML = `
<div class="counter-card">
  <div class="counter-card-head">
    <img class="counter-card-portrait" src="${img}" alt="${esc(parsed.name)}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="counter-card-portrait-fallback ${fbClass}">${initials}</div>
    <div class="counter-card-meta">
      <div class="counter-card-label">Recommended counter · ${esc(roleLabel)}</div>
      <div class="counter-card-name">${esc(parsed.name)}</div>
    </div>
  </div>
  <div class="counter-card-body">
    <div class="counter-why">${esc(parsed.why)}</div>
    <div class="counter-also">
      <div class="counter-also-label">Full ${esc(myRole === 'sup' ? 'Support' : myRole === 'tank' ? 'Tank' : 'Damage')} analysis</div>
      <div class="counter-also-text">${esc(alsoText)}</div>
    </div>
  </div>
</div>`;
}

function showCounter(btn){
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.getElementById('sec-counter').classList.add('visible');
  document.getElementById('search').parentElement.style.display='none';
}

function showRole(role, btn){
  document.getElementById('search').parentElement.style.display='';
  document.querySelectorAll('.role-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('visible'));
  document.getElementById('sec-'+role).classList.add('visible');
  activeRole=role;
  filterHeroes();
}

function filterHeroes(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  let any=false;
  document.querySelectorAll('.hero-card').forEach(c=>{
    const show=c.dataset.r===activeRole&&(!q||c.dataset.n.includes(q));
    c.classList.toggle('hidden',!show);
    if(show)any=true;
  });
  document.getElementById('no-results').classList.toggle('visible',!any&&q.length>0);
}
